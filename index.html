  // ── Voice-to-text recording ──
  // ── Ring animation helpers ──
  function startRingAnimation(stream) {
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if (!AudioCtx) return;
    const ctx = new AudioCtx();
    const analyser = ctx.createAnalyser();
    analyser.fftSize = 512; analyser.smoothingTimeConstant = 0.75;
    ctx.createMediaStreamSource(stream).connect(analyser);
    const data = new Uint8Array(analyser.frequencyBinCount);
    audioContextRef.current = ctx; analyserRef.current = analyser; dataArrayRef.current = data;
    let idlePhase = 0;
    function tick() {
      analyser.getByteFrequencyData(data);
      let sum = 0; const bins = Math.min(60, data.length);
      for (let i = 0; i < bins; i++) sum += data[i];
      const vol = Math.min(sum / bins / 85, 1);
      idlePhase += 0.028;
      const idle = Math.sin(idlePhase) * 0.022 + 1;
      if (ring1Ref.current) ring1Ref.current.style.transform = `scale(${(idle + vol * 0.38).toFixed(4)})`;
      if (ring2Ref.current) ring2Ref.current.style.transform = `scale(${(idle * 0.99 + vol * 0.27).toFixed(4)})`;
      if (ring3Ref.current) ring3Ref.current.style.transform = `scale(${(idle * 0.98 + vol * 0.17).toFixed(4)})`;
      if (ring4Ref.current) ring4Ref.current.style.transform = `scale(${(idle * 0.97 + vol * 0.09).toFixed(4)})`;
      animFrameRef.current = requestAnimationFrame(tick);
    }
    animFrameRef.current = requestAnimationFrame(tick);
  }
  function stopRingAnimation() {
    if (animFrameRef.current) { cancelAnimationFrame(animFrameRef.current); animFrameRef.current = null; }
    if (audioContextRef.current) { audioContextRef.current.close().catch(()=>{}); audioContextRef.current = null; analyserRef.current = null; dataArrayRef.current = null; }
  }

  async function startRecording() {
    if (!user) { setShowAuthModal(true); return; }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
      // ── Primary path: browser-native speech recognition (no API key needed) ──
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        startRingAnimation(stream);
        setIsRecording(true);
        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.continuous = false;
        recognition.interimResults = false;
        speechRecRef.current = recognition;
        recognition.onresult = (e) => {
          const transcript = Array.from(e.results).map(r => r[0].transcript).join('').trim();
          if (transcript) { setInput(prev => prev ? prev + ' ' + transcript : transcript); inputRef.current?.focus(); }
          else setToastMsg("Couldn't catch that — try speaking louder or closer");
        };
        recognition.onend = () => {
          stream.getTracks().forEach(t => t.stop());
          stopRingAnimation();
          setIsRecording(false);
          speechRecRef.current = null;
        };
        recognition.onerror = (e) => {
          if (e.error !== 'aborted') setToastMsg(e.error === 'not-allowed' ? "Couldn't access microphone — check browser permissions" : "Couldn't catch that — try again");
        };
        recognition.start();
      } catch (err) {
        console.error('Mic access error:', err);
        setToastMsg("Couldn't access microphone — check browser permissions");
      }
      return;
    }

    // ── Fallback: MediaRecorder + Groq Whisper ──
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioChunksRef.current = [];
      const recorder = new MediaRecorder(stream, { mimeType: MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm' });
      recorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunksRef.current.push(e.data); };
      recorder.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        const blob = new Blob(audioChunksRef.current, { type: recorder.mimeType });
        if (blob.size < 100) { setToastMsg("Recording too short — try again"); return; }
        await transcribeAudio(blob);
      };
      mediaRecorderRef.current = recorder;
      recorder.start();
      startRingAnimation(stream);
      setIsRecording(true);
    } catch (err) {
      console.error('Mic access error:', err);
      setToastMsg("Couldn't access microphone — check browser permissions");
    }
  }

  function stopRecording() {
    if (speechRecRef.current) { speechRecRef.current.stop(); speechRecRef.current = null; return; }
    stopRingAnimation();
    if (mediaRecorderRef.current && mediaRecorderRef.current.state !== 'inactive') mediaRecorderRef.current.stop();
    setIsRecording(false);
  }

        <div style={{position:'absolute',width:200,height:200,background:'radial-gradient(circle, rgba(108,99,255,0.1) 0%, transparent 70%)',borderRadius:'50%',filter:'blur(40px)',pointerEvents:'none'}}/>
        <div style={{fontSize:'2.2rem',fontWeight:900,background:'linear-gradient(135deg, #7B6CFF 0%, var(--teal) 50%, #45aaf2 100%)',backgroundSize:'200% 200%',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',marginBottom:16,position:'relative',animation:'gradientShift 3s ease infinite'}}>SOS</div>
        <div style={{width:28,height:28,border:'3px solid rgba(108,99,255,0.15)',borderTopColor:'var(--accent)',borderRightColor:'var(--teal)',borderRadius:'50%',animation:'spin 0.8s linear infinite',position:'relative',boxShadow:'0 0 16px rgba(108,99,255,0.15)'}}/>
      </div>
    );
  }

  return (
    <div className="sos-app">
      {/* ── Header ── */}
      <div className="sos-header">
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <div style={{fontSize:'1.15rem',fontWeight:800,letterSpacing:'-0.5px',background:'linear-gradient(135deg, #7B6CFF, var(--teal), #45aaf2)',backgroundSize:'200% 200%',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',animation:'gradientShift 4s ease infinite'}}>SOS</div>
          {user && <div style={{fontSize:'0.75rem',color:'var(--text-dim)',display:'flex',alignItems:'center',gap:4}}>
            <span className={'sync-dot '+(syncStatus==='saving'?'sync-saving':syncStatus==='error'?'sync-error':'sync-saved')}/>
            {syncStatus==='saving'?'Saving...':syncStatus==='error'?'Sync error':'Synced'}
          </div>}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          {activeTaskCount>0&&<div style={{fontSize:'0.75rem',color:overdueCount>0?'var(--danger)':'var(--text-dim)',display:'flex',alignItems:'center',gap:4}}><span style={{width:8,height:8,borderRadius:4,background:overdueCount>0?'var(--danger)':'var(--accent)',display:'inline-block'}}/>{activeTaskCount} task{activeTaskCount!==1?'s':''}{overdueCount>0&&<span style={{color:'var(--danger)'}}>({overdueCount} overdue)</span>}</div>}
          <button onClick={()=>setShowPeek(true)} title="View schedule (S)" style={{background:'rgba(108,99,255,0.1)',border:'1px solid rgba(108,99,255,0.25)',color:'var(--accent)',cursor:'pointer',borderRadius:8,padding:'5px 10px',fontSize:'0.78rem',fontWeight:600,transition:'all .2s',display:'flex',alignItems:'center',gap:4}}>{Icon.clipboard(14)} Peek</button>
          <button onClick={()=>setShowNotes(true)} title="View notes (N)" style={{background:'rgba(108,99,255,0.1)',border:'1px solid rgba(108,99,255,0.25)',color:'var(--accent)',cursor:'pointer',borderRadius:8,padding:'5px 10px',fontSize:'0.78rem',fontWeight:600,transition:'all .2s',display:'flex',alignItems:'center',gap:4}}>{Icon.fileText(14)} Notes{notes.length>0&&<span style={{fontSize:'0.68rem',background:'linear-gradient(135deg,var(--accent),#5a54d4)',color:'#fff',borderRadius:8,padding:'1px 5px',fontWeight:700}}>{notes.length}</span>}</button>
          <button onClick={()=>setShowChatSidebar(true)} title="Chat history (H)" style={{background:'rgba(108,99,255,0.1)',border:'1px solid rgba(108,99,255,0.25)',color:'var(--accent)',cursor:'pointer',borderRadius:8,padding:'5px 10px',fontSize:'0.78rem',fontWeight:600,transition:'all .2s',display:'flex',alignItems:'center',gap:4}}>{Icon.messageCircle(14)} History{savedChats.length>0&&<span style={{fontSize:'0.68rem',background:'linear-gradient(135deg,var(--accent),#5a54d4)',color:'#fff',borderRadius:8,padding:'1px 5px',fontWeight:700}}>{savedChats.length}</span>}</button>
          {isGoogleConnected() ? (
            <button onClick={()=>setShowGoogleModal(true)} className="g-hdr-btn connected" title="Import from Google Calendar, Docs, or Drive">
              {Icon.link(14)} Import
            </button>
          ) : (
            <button onClick={connectGoogle} className="g-hdr-btn" title="Connect your Google account to import calendar events, docs, and PDFs">
              <span style={{fontWeight:900,fontSize:'0.85rem'}}>G</span> Connect
            </button>
          )}
          <div title="Content generations remaining today" style={{fontSize:'0.72rem',color:contentGenUsed>=DAILY_CONTENT_LIMIT?'var(--danger)':'var(--text-dim)',display:'flex',alignItems:'center',gap:4}}>
            <span style={{display:'flex',color:'var(--accent)'}}>{Icon.sparkles(14)}</span>
            <span style={{fontWeight:600}}>{Math.max(0, DAILY_CONTENT_LIMIT - contentGenUsed)}/{DAILY_CONTENT_LIMIT}</span>
          </div>
          {weatherData?.current&&<div style={{display:'flex',alignItems:'center',gap:4}}><span style={{display:'flex',color:'var(--teal)'}}>{weatherEmoji(weatherData.current.weathercode)}</span><span style={{fontWeight:600,fontSize:'0.82rem'}}>{Math.round(weatherData.current.temperature_2m)}°</span></div>}
          {user ? (
            <button onClick={handleLogout} title="Sign out" style={{background:'transparent',border:'1px solid var(--border)',color:'var(--text-dim)',cursor:'pointer',borderRadius:8,padding:'5px 8px',fontSize:'0.72rem',transition:'all .2s',display:'flex',alignItems:'center',gap:4}}>{Icon.logout(12)} Sign out</button>
          ) : (
            <button onClick={()=>setShowAuthModal(true)} title="Sign in" style={{background:'linear-gradient(135deg,var(--accent),#5a54d4)',border:'none',color:'#fff',cursor:'pointer',borderRadius:8,padding:'5px 10px',fontSize:'0.72rem',fontWeight:600,transition:'all .2s'}}>Sign in</button>
          )}
        </div>
      </div>

      {/* ── Chat Area ── */}
      <div className="sos-chat-area" ref={chatAreaRef}>
        {viewingSavedChatId && (
          <div style={{padding:'8px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',background:'rgba(108,99,255,0.06)',border:'1px solid rgba(108,99,255,0.2)',borderRadius:12,margin:'0 16px 8px',animation:'fadeIn .2s ease'}}>
            <span style={{fontSize:'0.82rem',color:'var(--accent)',fontWeight:600}}>Viewing saved conversation</span>
            <button onClick={exitSavedChatView} style={{background:'var(--accent)',color:'#fff',border:'none',borderRadius:8,padding:'5px 12px',fontSize:'0.78rem',fontWeight:600,cursor:'pointer',transition:'all .15s'}}>Back to chat</button>
          </div>
        )}
        {messages.length===0&&!isLoading&&!viewingSavedChatId&&(()=>{
          // Show Daily Brief card when available
          if (dailyBrief) {
            return (
              <div style={{position:'relative',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'flex-start',height:'100%',padding:'24px 16px',overflowY:'auto'}}>
                <div style={{position:'absolute',top:'10%',width:240,height:240,background:'radial-gradient(circle, rgba(108,99,255,0.12) 0%, rgba(43,203,186,0.06) 40%, transparent 70%)',borderRadius:'50%',filter:'blur(50px)',pointerEvents:'none',animation:'breathe 4s ease-in-out infinite'}}/>
                <div style={{fontSize:'1.8rem',marginBottom:4,background:'linear-gradient(135deg, #7B6CFF 0%, var(--teal) 50%, #45aaf2 100%)',backgroundSize:'200% 200%',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',fontWeight:900,letterSpacing:'-0.5px',position:'relative',animation:'gradientShift 4s ease infinite, floatUp 0.5s cubic-bezier(0.16,1,0.3,1) both'}}>SOS</div>
                <div style={{fontSize:'0.82rem',color:'var(--text-dim)',marginBottom:16,animation:'textReveal 0.4s ease 0.1s both'}}>Here's your game plan for today</div>
                <DailyBriefCard brief={dailyBrief} onAction={(text) => sendChip(text)} />
              </div>
            );
          }
          // Default welcome screen
          const wv = welcomeVariants[welcomeIdx];
          return (
          <div style={{position:'relative',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',padding:'48px 24px',textAlign:'center'}}>
            <div style={{position:'absolute',top:'28%',width:240,height:240,background:'radial-gradient(circle, rgba(108,99,255,0.12) 0%, rgba(43,203,186,0.06) 40%, transparent 70%)',borderRadius:'50%',filter:'blur(50px)',pointerEvents:'none',animation:'breathe 4s ease-in-out infinite, orbFloat 8s ease-in-out infinite'}}/>
            <div style={{fontSize:'3.2rem',marginBottom:16,background:'linear-gradient(135deg, #7B6CFF 0%, var(--teal) 50%, #45aaf2 100%)',backgroundSize:'200% 200%',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',fontWeight:900,letterSpacing:'-1px',position:'relative',animation:'gradientShift 4s ease infinite, floatUp 0.6s cubic-bezier(0.16,1,0.3,1) both'}}>SOS</div>
            <div style={{fontSize:'1.05rem',color:'var(--text)',fontWeight:600,marginBottom:8,position:'relative',animation:'textReveal 0.5s ease 0.15s both'}}>{wv.greeting}</div>
            <div style={{fontSize:'0.88rem',color:'var(--text-dim)',maxWidth:400,lineHeight:1.65,marginBottom:32,position:'relative',animation:'textReveal 0.5s ease 0.3s both'}}>{wv.desc}</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:8,justifyContent:'center',maxWidth:440,position:'relative'}}>
              {wv.chips.map((s,i)=>(
                <button key={s} className="sos-chip" style={{animation:`floatUp 0.4s cubic-bezier(0.16,1,0.3,1) ${0.4+i*0.08}s both`}} onClick={()=>sendChip(s)}>{s}</button>
              ))}
            </div>
          </div>
          );
        })()}
        {messages.map((msg,i)=>(
          <div key={i} className={`sos-msg ${msg.role==='user'?'sos-msg-user':'sos-msg-ai'}`}>
            <div className={`sos-bubble ${msg.role==='user'?'sos-bubble-user':'sos-bubble-ai'}`}>
              {(msg.photoUrl||msg.photoPreview)&&(
                <img src={msg.photoUrl||msg.photoPreview} alt="photo"
                  onClick={()=>setLightboxUrl(msg.photoUrl||msg.photoPreview)}
                  style={{maxWidth:240,maxHeight:200,borderRadius:10,marginBottom:msg.content?8:0,cursor:'pointer',display:'block'}}/>
              )}
              {msg.content&&<span>{msg.content}</span>}
              <div className="sos-bubble-time">{msg.timestamp?new Date(msg.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):''}</div>
            </div>
          </div>
        ))}
        {pendingActions.length > 1 ? (
          <div className="sos-msg sos-msg-ai" style={{padding:'6px 16px'}}>
            <BulkConfirmationCard
              actions={pendingActions}
              onConfirmSelected={(checkedArr)=>{
                const toExec=pendingActions.filter((_,i)=>checkedArr[i]);
                toExec.forEach(pa=>{
                  if(pa.action.type==='add_recurring_event'){
                    const dayNameToIndex={Sunday:0,Monday:1,Tuesday:2,Wednesday:3,Thursday:4,Friday:5,Saturday:6};
                    const dayIndices=(pa.action.days||[]).map(d=>dayNameToIndex[d]).filter(d=>d!==undefined);
                    const start=new Date(pa.action.start_date||new Date().toISOString().slice(0,10));
                    const endDef=new Date();endDef.setMonth(endDef.getMonth()+3);
                    const end=new Date(pa.action.end_date||endDef.toISOString().slice(0,10));
                    const cursor=new Date(start);let count=0;
                    while(cursor<=end&&count<100){
                      if(dayIndices.includes(cursor.getDay())){
                        const ds=toDateStr(cursor);
                        executeAction({type:'add_event',title:pa.action.title,date:ds,event_type:pa.action.event_type||'event',subject:pa.action.subject||''});
                        count++;
                      }
                      cursor.setDate(cursor.getDate()+1);
                    }
                  } else { executeAction(pa.action); }
                });
                setPendingActions(prev=>prev.filter((_,i)=>!checkedArr[i]));
                if(toExec.length>0)setToastMsg('Added '+toExec.length+' items');
              }}
              onCancel={()=>setPendingActions([])}
            />
          </div>
        ) : pendingActions.map((pa,idx)=>(
          <div key={'pa-'+idx} className="sos-msg sos-msg-ai" style={{padding:'6px 16px'}}>
            {pa.action.type==='add_recurring_event' ? (
              <RecurringEventPopup
                action={pa.action}
                onConfirm={(checkedEvents)=>{
                  checkedEvents.forEach(ev=>executeAction({type:'add_event',title:ev.title,date:ev.date,event_type:ev.event_type,subject:ev.subject}));
                  setPendingActions(prev=>prev.filter((_,i)=>i!==idx));
                  setToastMsg('Added '+checkedEvents.length+' recurring events');
                }}
                onCancel={()=>handleCancelAction(idx)}
              />
            ) : (
              <ConfirmationCard action={pa.action} onConfirm={(action)=>handleConfirmAction(idx,action)} onCancel={()=>handleCancelAction(idx)} isFallback={pa.isFallback}/>
            )}
          </div>
        ))}
        {pendingContent.map((pc,idx)=>(
          <div key={'pc-'+idx} className="sos-msg sos-msg-ai" style={{padding:'6px 16px'}}>
            <ContentTypeRouter content={pc} onSave={()=>handleSaveContent(idx)} onDismiss={()=>handleDismissContent(idx)}/>
          </div>
        ))}
        {isLoading&&<TypingDots/>}
        {chatError&&<div style={{padding:'8px 16px'}}><div style={{padding:'10px 14px',borderRadius:12,background:'rgba(255,71,87,0.08)',border:'1px solid rgba(255,71,87,0.25)',fontSize:'0.84rem',color:'var(--danger)',maxWidth:'80%'}}>{chatError}</div></div>}
        <div ref={messagesEndRef} style={{height:1}}/>
      </div>

      {/* ── Input Area ── */}
      <div className="sos-input-area">
        {messages.length>0&&(
          <div style={{display:'flex',gap:8,marginBottom:8,overflowX:'auto',paddingBottom:2}}>
            {quickChips.map((chip,i)=>(<button key={i} className="sos-chip" onClick={()=>chip.action?chip.action():sendChip(chip.msg)}>{chip.label}</button>))}
            {!viewingSavedChatId && <button className="sos-chip" onClick={saveChat} style={{background:'rgba(46,213,115,0.08)',borderColor:'rgba(46,213,115,0.2)',color:'var(--success)'}}>Save chat</button>}
            {viewingSavedChatId && <button className="sos-chip" onClick={exitSavedChatView} style={{background:'rgba(108,99,255,0.08)',borderColor:'rgba(108,99,255,0.2)',color:'var(--accent)'}}>Back to chat</button>}
            <button className="sos-chip" onClick={()=>setShowChatSidebar(true)} style={{background:'rgba(108,99,255,0.06)',borderColor:'rgba(108,99,255,0.15)',color:'var(--accent)'}}>History</button>
          </div>
        )}
        {pendingPhoto&&(
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8,padding:'6px 10px',background:'var(--bg)',borderRadius:12,border:'1px solid var(--border)',animation:'fadeIn .2s ease'}}>
            <img src={pendingPhoto.preview} alt="attached" style={{width:48,height:48,borderRadius:8,objectFit:'cover'}}/>
            <span style={{fontSize:'0.82rem',color:'var(--text-dim)',flex:1}}>Photo attached</span>
            <button onClick={()=>setPendingPhoto(null)} style={{background:'transparent',border:'none',color:'var(--danger)',cursor:'pointer',padding:'4px 8px',display:'flex'}}>{Icon.x(16)}</button>
          </div>
        )}
        <form onSubmit={handleSubmit} style={{display:'flex',gap:8,alignItems:'center'}}>
          <input ref={photoInputRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={handlePhotoSelect}/>
          <button type="button" onClick={()=>photoInputRef.current?.click()} disabled={isLoading||isRecording}
            style={{width:40,height:40,borderRadius:'50%',background:'transparent',border:'1px solid '+(pendingPhoto?'var(--accent)':'var(--border)'),color:pendingPhoto?'var(--accent)':'var(--text-dim)',cursor:(isLoading||isRecording)?'not-allowed':'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all .2s',opacity:(isLoading||isRecording)?0.5:1}}>
            {Icon.camera(18)}
          </button>
          <button type="button" onClick={toggleRecording} disabled={isLoading||isTranscribing||!!viewingSavedChatId}
            style={{width:40,height:40,borderRadius:'50%',background:isRecording?'rgba(255,71,87,0.15)':'transparent',border:'1px solid '+(isRecording?'var(--danger)':isTranscribing?'var(--accent)':'var(--border)'),color:isRecording?'var(--danger)':isTranscribing?'var(--accent)':'var(--text-dim)',cursor:(isLoading||isTranscribing||viewingSavedChatId)?'not-allowed':'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all .2s',opacity:(isLoading||isTranscribing||viewingSavedChatId)?0.5:1,animation:isRecording?'rippleGlow 1.5s ease infinite':'none'}}>
            {isTranscribing?React.createElement('div',{style:{width:16,height:16,border:'2px solid var(--accent)',borderTopColor:'transparent',borderRadius:'50%',animation:'spin .6s linear infinite'}}):isRecording?Icon.micOff(18):Icon.mic(18)}
          </button>
          <input ref={inputRef} value={input} onChange={e=>setInput(e.target.value)}
            placeholder={viewingSavedChatId?"viewing saved chat — click 'Back to chat' to resume":pendingPhoto?"add a message or just send the photo...":messages.length===0?["What's on your plate today?","What do you need help with?","Tell me about your classes...","What's coming up this week?","Anything on your mind?"][welcomeIdx]:"type anything..."}
            disabled={isLoading||!!viewingSavedChatId}
            style={{flex:1,background:'var(--bg)',color:'var(--text)',border:'1px solid var(--border)',borderRadius:24,padding:'12px 20px',fontSize:'0.92rem',outline:'none',opacity:(isLoading||viewingSavedChatId)?0.5:1,transition:'all .25s cubic-bezier(0.16,1,0.3,1)'}}
            onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleSubmit()}}}/>
          <button type="submit" disabled={isLoading||!!viewingSavedChatId||(!input.trim()&&!pendingPhoto)} style={{width:44,height:44,borderRadius:'50%',background:(isLoading||!!viewingSavedChatId||(!input.trim()&&!pendingPhoto))?'var(--border)':'linear-gradient(135deg,var(--accent),#5a54d4)',color:'#fff',border:'none',cursor:(isLoading||!!viewingSavedChatId||(!input.trim()&&!pendingPhoto))?'not-allowed':'pointer',display:'flex',alignItems:'center',justifyContent:'center',transition:'all .2s',flexShrink:0,boxShadow:(isLoading||!!viewingSavedChatId||(!input.trim()&&!pendingPhoto))?'none':'0 2px 12px rgba(108,99,255,0.3)'}}>{Icon.send(18)}</button>
        </form>
        <div style={{display:'flex',justifyContent:'center',gap:16,marginTop:8,fontSize:'0.68rem',color:'var(--text-dim)',flexWrap:'wrap'}}><span>/ to focus input</span><span>S for schedule</span><span>N for notes</span><span>H for history</span><span>Cam for photo</span><span>Mic for voice</span><a href="privacy.html" style={{color:'var(--text-dim)',textDecoration:'none',opacity:0.6,transition:'opacity .15s'}} onMouseEnter={e=>e.target.style.opacity=1} onMouseLeave={e=>e.target.style.opacity=0.6}>Privacy Policy</a></div>
      </div>

      {showPeek&&<SchedulePeek tasks={tasks} blocks={blocks} events={events} weatherData={weatherData} onClose={()=>setShowPeek(false)}/>}
      {showNotes&&<NotesPanel notes={notes} onClose={()=>setShowNotes(false)} onDeleteNote={handleDeleteNote} onUpdateNote={handleUpdateNote} onCreateNote={handleCreateNote}/>}
      {showChatSidebar&&(
        <>
          <div className="chat-sidebar-overlay" onClick={()=>setShowChatSidebar(false)}/>
          <div className="chat-sidebar">
            <div className="chat-sidebar-header">
              <div className="chat-sidebar-title"><span style={{display:'flex',color:'var(--accent)'}}>{Icon.messageCircle(18)}</span> Saved Chats</div>
              <button className="g-modal-close" onClick={()=>setShowChatSidebar(false)}>{Icon.x(16)}</button>
            </div>
            {savedChats.length === 0 ? (
              <div className="chat-sidebar-empty">
                <div style={{marginBottom:8,opacity:0.4,display:'flex',justifyContent:'center',color:'var(--accent)'}}>{Icon.messageCircle(28)}</div>
                <div>No saved conversations yet</div>
                <div style={{fontSize:'0.78rem',marginTop:4}}>Use "Save chat" to keep a conversation</div>
              </div>
            ) : (
              <div className="chat-sidebar-list">
                {savedChats.map(chat => (
                  <div key={chat.id} className={'chat-sidebar-item' + (viewingSavedChatId === chat.id ? ' active' : '')}
                    onClick={() => loadSavedChat(chat.id)}>
                    <div className="chat-sidebar-item-title">{chat.title}</div>
                    <div className="chat-sidebar-item-meta">
                      <span>{chat.messageCount} message{chat.messageCount !== 1 ? 's' : ''} · {fmt(chat.savedAt)}</span>
                      <button className="chat-sidebar-item-delete" onClick={e => { e.stopPropagation(); deleteSavedChat(chat.id); }}>Delete</button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </>
      )}
      {showGoogleModal && isGoogleConnected() && (
        <GoogleImportModal
          googleToken={googleToken}
          googleUser={googleUser}
          onClose={()=>setShowGoogleModal(false)}
          onImportEvents={handleImportGoogleEvents}
          onImportDoc={handleImportGoogleDoc}
          onImportPdf={handleImportPdf}
          onDisconnect={()=>{ disconnectGoogle(); setShowGoogleModal(false); }}
          calSyncEnabled={calSyncEnabled}
          calSyncStatus={calSyncStatus}
          calSyncLastAt={calSyncLastAt}
          calSyncCount={calSyncCount}
          calSyncError={calSyncError}
          onToggleCalSync={toggleCalSync}
          onSyncNow={()=>syncCalendarRef.current()}
        />
      )}
      {showAuthModal && <AuthModal onAuth={(u)=>{handleAuth(u);setShowAuthModal(false);}} onClose={()=>setShowAuthModal(false)} />}
      {toastMsg&&<Toast message={toastMsg} onDone={()=>setToastMsg(null)}/>}

      {/* ── Voice Recording Circle Overlay ── */}
      {isRecording&&(
        <div className="voice-overlay" onClick={stopRecording}>
          <div className="voice-rings">
            <div className="voice-ring voice-ring-1" ref={ring1Ref}/>
            <div className="voice-ring voice-ring-2" ref={ring2Ref}/>
            <div className="voice-ring voice-ring-3" ref={ring3Ref}/>
            <div className="voice-ring voice-ring-4" ref={ring4Ref}/>
            <div className="voice-center">{Icon.mic(28)}</div>
          </div>
          <div style={{marginTop:36,textAlign:'center',pointerEvents:'none'}}>
            <div style={{fontSize:'1.05rem',fontWeight:700,color:'var(--text)',letterSpacing:0.4,marginBottom:6}}>Listening...</div>
            <div style={{fontSize:'0.78rem',color:'var(--text-dim)'}}>Tap anywhere to stop</div>
          </div>
        </div>
      )}

      {lightboxUrl&&(
        <div onClick={()=>setLightboxUrl(null)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.92)',zIndex:999,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',animation:'overlayIn .2s ease'}}>
          <img src={lightboxUrl} alt="full size" style={{maxWidth:'90vw',maxHeight:'90vh',borderRadius:12,objectFit:'contain'}}/>
        </div>
      )}
    </div>
  );
}

/* ─── Mount ─── */
try {
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
} catch (e) {
  document.getElementById('root').innerHTML = '<div style="padding:40px;text-align:center;color:#ff4757;font-family:sans-serif"><h2>Failed to load SOS</h2><p>' + e.message + '</p></div>';
}
</script>
</body>
</html>
