<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SOS — Student Operating System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.9/babel.min.js"></script>
<!-- Google Identity Services (OAuth for Calendar/Docs/Drive) -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<!-- pdf.js v3 UMD build (v4 uses ESM which breaks Babel setup) -->
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<script>if(window.pdfjsLib){pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';}</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--bg2:#0f0f1a;--card:#1a1a2e;--accent:#6C63FF;--accent-dim:#4a44b3;--accent-glow:rgba(108,99,255,0.15);--text:#e0e0e0;--text-dim:#888;--border:#2a2a4e;--danger:#ff4757;--success:#2ed573;--warning:#ffa502;--green:#2ed573;--blue:#45aaf2;--orange:#fd9644;--pink:#fc5c65;--teal:#2bcbba;--radius:14px;--shadow:0 4px 20px rgba(0,0,0,0.4);--space-xs:4px;--space-sm:8px;--space-md:12px;--space-lg:16px;--space-xl:20px;--space-2xl:24px;--space-3xl:32px;--space-4xl:48px}
html,body{height:100%;font-size:16px}
body{background:linear-gradient(160deg,#0a0a0a 0%,#0d0d1f 30%,#0a0a14 60%,#08080f 100%);color:var(--text);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden;min-height:100vh}
input,textarea,select,button{font-family:inherit;font-size:inherit}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--accent-dim);border-radius:3px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes dotPulse{0%,80%,100%{opacity:0.3;transform:scale(0.8)}40%{opacity:1;transform:scale(1)}}
@keyframes overlayIn{from{opacity:0}to{opacity:1}}
@keyframes toastIn{from{opacity:0;transform:translateY(-20px) translateX(-50%)}to{opacity:1;transform:translateY(0) translateX(-50%)}}
@keyframes toastOut{from{opacity:1;transform:translateY(0) translateX(-50%)}to{opacity:0;transform:translateY(-20px) translateX(-50%)}}
@keyframes peekSlideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes cardPop{from{opacity:0;transform:scale(0.95) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes gentlePulse{0%,100%{opacity:1}50%{opacity:0.7}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 8px rgba(108,99,255,0.15),0 0 24px rgba(108,99,255,0.05)}50%{box-shadow:0 0 16px rgba(108,99,255,0.3),0 0 48px rgba(108,99,255,0.1)}}
@keyframes borderGlow{0%,100%{border-color:rgba(108,99,255,0.12)}50%{border-color:rgba(108,99,255,0.35)}}
@keyframes floatUp{0%{opacity:0;transform:translateY(20px) scale(0.97)}100%{opacity:1;transform:translateY(0) scale(1)}}
@keyframes breathe{0%,100%{transform:scale(1);opacity:0.12}50%{transform:scale(1.15);opacity:0.2}}
@keyframes slideInRight{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
@keyframes rippleGlow{0%{box-shadow:0 0 0 0 rgba(108,99,255,0.3)}70%{box-shadow:0 0 0 10px rgba(108,99,255,0)}100%{box-shadow:0 0 0 0 rgba(108,99,255,0)}}
@keyframes holoShimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes textReveal{from{opacity:0;transform:translateY(6px);filter:blur(4px)}to{opacity:1;transform:translateY(0);filter:blur(0)}}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(8px,-12px) scale(1.05)}50%{transform:translate(-4px,-8px) scale(0.98)}75%{transform:translate(-10px,4px) scale(1.02)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
@keyframes neonFlicker{0%,100%{opacity:1}92%{opacity:1}93%{opacity:0.7}94%{opacity:1}96%{opacity:0.8}97%{opacity:1}}
.fade-in{animation:fadeIn .3s ease}
.slide-up{animation:slideUp .3s ease}
.card-pop{animation:cardPop .25s ease}

/* SOS Layout */
#root{height:100vh;display:flex;flex-direction:column}
.sos-app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.sos-header{padding:12px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(108,99,255,0.15);background:linear-gradient(180deg,#1a1a2e 0%,#12122a 100%);flex-shrink:0;z-index:10;animation:fadeIn .4s ease}
.sos-chat-area{flex:1;overflow-y:auto;padding:16px 0;scroll-behavior:smooth;background:transparent}
.sos-input-area{flex-shrink:0;border-top:1px solid rgba(108,99,255,0.12);background:linear-gradient(180deg,#12122a 0%,#1a1a2e 100%);padding:8px 16px 12px;animation:fadeIn .3s ease}
.sos-msg{padding:8px 16px;display:flex}
.sos-msg-user{justify-content:flex-end;animation:slideInRight .3s cubic-bezier(0.16,1,0.3,1)}
.sos-msg-ai{justify-content:flex-start;animation:slideInLeft .3s cubic-bezier(0.16,1,0.3,1)}
.sos-bubble{max-width:80%;padding:12px 16px;border-radius:20px;font-size:0.92rem;line-height:1.55;word-break:break-word;position:relative}
.sos-bubble-user{background:linear-gradient(135deg,var(--accent) 0%,#5a54d4 100%);color:#fff;border-bottom-right-radius:6px;box-shadow:0 2px 12px rgba(108,99,255,0.2);background-size:200% 200%;animation:gradientShift 6s ease infinite}
.sos-bubble-ai{background:linear-gradient(135deg,rgba(26,26,46,0.95) 0%,rgba(15,15,26,0.95) 100%);border:1px solid rgba(108,99,255,0.08);border-bottom-left-radius:6px;backdrop-filter:blur(8px);animation:borderGlow 3s ease-in-out infinite}
.sos-bubble-time{font-size:0.6rem;opacity:0.45;margin-top:4px;text-align:right}
.sos-chip{background:rgba(108,99,255,0.08);border:1px solid rgba(108,99,255,0.2);color:var(--accent);padding:6px 14px;border-radius:24px;font-size:0.82rem;cursor:pointer;transition:all .25s cubic-bezier(0.16,1,0.3,1);white-space:nowrap;position:relative;overflow:hidden}
.sos-chip::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(108,99,255,0.08),transparent);transform:translateX(-100%);transition:none}
.sos-chip:hover{background:linear-gradient(135deg,rgba(108,99,255,0.18),rgba(43,203,186,0.1));border-color:var(--accent);box-shadow:0 2px 16px rgba(108,99,255,0.15);transform:translateY(-1px)}
.sos-chip:hover::after{transform:translateX(100%);transition:transform .5s ease}
.sos-chip:active{transform:translateY(0) scale(0.96)}

/* Confirmation Card — JARVIS Panel */
.confirm-card{background:linear-gradient(160deg,rgba(10,10,18,0.95) 0%,rgba(15,15,30,0.92) 100%);border:1px solid rgba(108,99,255,0.1);border-left:3px solid var(--accent);border-radius:4px 16px 16px 4px;padding:0;margin:8px 0;max-width:380px;animation:scaleIn .35s cubic-bezier(0.16,1,0.3,1);transition:transform .25s ease,box-shadow .25s ease,border-color .25s ease;backdrop-filter:blur(12px);overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.4),inset 0 1px 0 rgba(108,99,255,0.06)}
.confirm-card:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(108,99,255,0.12),0 0 40px rgba(108,99,255,0.04);border-color:rgba(108,99,255,0.2)}
.confirm-card-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 10px;border-bottom:1px solid rgba(108,99,255,0.08);background:rgba(108,99,255,0.03)}
.confirm-card-hdr-left{display:flex;align-items:center;gap:8px}
.confirm-card-hdr-icon{width:30px;height:30px;border-radius:8px;background:rgba(108,99,255,0.1);border:1px solid rgba(108,99,255,0.15);display:flex;align-items:center;justify-content:center;color:var(--accent)}
.confirm-card-hdr-title{font-weight:700;font-size:0.88rem;color:var(--text);letter-spacing:0.3px}
.confirm-card-hdr-badge{font-size:0.62rem;font-weight:700;padding:2px 8px;border-radius:6px;letter-spacing:0.5px;text-transform:uppercase}
.confirm-card-body{padding:12px 16px}
.confirm-card-field{display:flex;align-items:center;padding:8px 0;font-size:0.85rem;border-bottom:1px solid rgba(255,255,255,0.03)}
.confirm-card-field:last-child{border-bottom:none}
.confirm-card-label{color:var(--text-dim);font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;width:72px;flex-shrink:0}
.confirm-card-value{font-weight:600;color:var(--text);flex:1}
.confirm-card-actions{display:flex;gap:8px;padding:10px 16px;border-top:1px solid rgba(108,99,255,0.08);background:rgba(108,99,255,0.02)}
.confirm-btn{padding:7px 16px;border-radius:10px;border:none;cursor:pointer;font-weight:600;font-size:0.82rem;transition:all .2s cubic-bezier(0.16,1,0.3,1);display:flex;align-items:center;gap:4px}
.confirm-btn:hover{transform:translateY(-1px)}
.confirm-btn:active{transform:scale(0.96)}
.confirm-btn-yes{background:linear-gradient(135deg,var(--accent) 0%,#5a54d4 100%);color:#fff;box-shadow:0 2px 12px rgba(108,99,255,0.25);background-size:200% 200%;animation:gradientShift 3s ease infinite}
.confirm-btn-edit{background:rgba(108,99,255,0.06);border:1px solid rgba(108,99,255,0.2);color:var(--accent);font-size:0.78rem}
.confirm-btn-edit:hover{background:rgba(108,99,255,0.12);border-color:var(--accent)}
.confirm-btn-cancel{background:rgba(255,71,87,0.06);border:1px solid rgba(255,71,87,0.2);color:var(--danger);font-size:0.78rem;padding:5px 10px}
.confirm-btn-cancel:hover{background:rgba(255,71,87,0.12);border-color:var(--danger)}

/* Edit fields inside confirmation card */
.confirm-edit-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.confirm-edit-input{background:rgba(10,10,18,0.8);border:1px solid rgba(108,99,255,0.12);border-radius:8px;padding:8px 12px;color:var(--text);font-size:0.85rem;outline:none;flex:1;transition:border-color .2s,box-shadow .2s}
.confirm-edit-input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(108,99,255,0.1)}

/* Content Cards — JARVIS Panel */
.content-card{background:linear-gradient(160deg,rgba(10,10,18,0.95) 0%,rgba(15,15,30,0.92) 100%);border:1px solid rgba(108,99,255,0.1);border-left:3px solid var(--teal);border-radius:4px 16px 16px 4px;padding:0;margin:8px 0;max-width:420px;animation:scaleIn .35s cubic-bezier(0.16,1,0.3,1);transition:transform .25s ease,box-shadow .25s ease,border-color .25s ease;backdrop-filter:blur(12px);overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.4),inset 0 1px 0 rgba(43,203,186,0.06)}
.content-card:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(43,203,186,0.1),0 0 40px rgba(43,203,186,0.04);border-color:rgba(43,203,186,0.2)}
.content-card-header{display:flex;align-items:center;gap:10px;padding:12px 16px 10px;border-bottom:1px solid rgba(43,203,186,0.08);background:rgba(43,203,186,0.03)}
.content-card-hdr-icon{width:30px;height:30px;border-radius:8px;background:rgba(43,203,186,0.1);border:1px solid rgba(43,203,186,0.15);display:flex;align-items:center;justify-content:center;color:var(--teal)}
.content-card-title{font-weight:700;font-size:0.88rem;color:var(--text);letter-spacing:0.3px}
.content-card-subject{font-size:0.68rem;color:var(--text-dim);margin-top:1px}
.content-card-body{padding:12px 16px}
.content-card-actions{display:flex;gap:8px;padding:10px 16px;border-top:1px solid rgba(43,203,186,0.08);background:rgba(43,203,186,0.02)}
.content-card-save{background:linear-gradient(135deg,var(--teal) 0%,#1db99a 100%);color:#fff;box-shadow:0 2px 12px rgba(43,203,186,0.25);background-size:200% 200%;animation:gradientShift 3s ease infinite;padding:7px 16px;border-radius:10px;border:none;cursor:pointer;font-weight:600;font-size:0.82rem;transition:all .2s cubic-bezier(0.16,1,0.3,1);display:flex;align-items:center;gap:4px}
.content-card-save:hover{transform:translateY(-1px)}
.content-card-save:active{transform:scale(0.96)}
.content-card-dismiss{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:var(--text-dim);padding:7px 14px;border-radius:10px;cursor:pointer;font-weight:600;font-size:0.78rem;transition:all .2s}
.content-card-dismiss:hover{border-color:var(--text-dim);color:var(--text)}

/* Flashcard */
.fc-container{perspective:600px;width:100%;height:160px;cursor:pointer;margin-bottom:8px}
.fc-inner{position:relative;width:100%;height:100%;transition:transform 0.6s cubic-bezier(0.16,1,0.3,1),box-shadow 0.6s ease;transform-style:preserve-3d}
.fc-inner.flipped{transform:rotateY(180deg)}
.fc-front,.fc-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:16px;display:flex;align-items:center;justify-content:center;padding:16px;text-align:center;font-size:0.9rem;line-height:1.5}
.fc-front{background:linear-gradient(135deg,#1e1e3a 0%,var(--bg2) 100%);border:1px solid rgba(108,99,255,0.15);transition:box-shadow .3s ease}
.fc-container:hover .fc-front{box-shadow:0 4px 20px rgba(108,99,255,0.1)}
.fc-back{background:linear-gradient(135deg,rgba(108,99,255,0.15) 0%,rgba(43,203,186,0.08) 100%);border:1px solid var(--accent-dim);transform:rotateY(180deg);color:var(--success);font-weight:600}
.fc-nav{display:flex;align-items:center;justify-content:space-between;gap:8px}
.fc-nav-btn{background:transparent;border:1px solid var(--border);color:var(--text-dim);border-radius:8px;width:36px;height:36px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .15s}
.fc-nav-btn:hover{border-color:var(--accent);color:var(--accent)}
.fc-nav-btn:disabled{opacity:0.3;cursor:not-allowed}
.fc-counter{font-size:0.8rem;color:var(--text-dim);font-weight:600}
.fc-hint{font-size:0.7rem;color:var(--text-dim);text-align:center;margin-top:6px;opacity:0.6}

/* Quiz */
.quiz-progress{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:0.78rem;color:var(--text-dim)}
.quiz-progress-bar{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.quiz-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--teal),var(--accent));background-size:200% 100%;border-radius:2px;transition:width .4s cubic-bezier(0.16,1,0.3,1);animation:holoShimmer 2s linear infinite}
.quiz-question{font-size:0.92rem;font-weight:600;margin-bottom:12px;line-height:1.5}
.quiz-choices{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.quiz-choice{background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:10px 14px;cursor:pointer;font-size:0.85rem;transition:all .2s cubic-bezier(0.16,1,0.3,1);text-align:left}
.quiz-choice:hover{border-color:var(--accent);background:rgba(108,99,255,0.05);transform:translateX(4px);box-shadow:0 2px 12px rgba(108,99,255,0.08)}
.quiz-choice.selected{border-color:var(--accent);background:rgba(108,99,255,0.1)}
.quiz-choice.correct{border-color:var(--success);background:rgba(46,213,115,0.1);color:var(--success)}
.quiz-choice.wrong{border-color:var(--danger);background:rgba(255,71,87,0.1);color:var(--danger)}
.quiz-choice.reveal-correct{border-color:var(--success);background:rgba(46,213,115,0.08)}
.quiz-score{text-align:center;padding:16px;font-size:1rem;font-weight:700;color:var(--accent)}
.quiz-btn{padding:8px 16px;border-radius:12px;border:none;cursor:pointer;font-weight:600;font-size:0.85rem;transition:all .2s cubic-bezier(0.16,1,0.3,1);background:linear-gradient(135deg,var(--accent) 0%,#5a54d4 100%);background-size:200% 200%;color:#fff;box-shadow:0 2px 8px rgba(108,99,255,0.2);animation:gradientShift 4s ease infinite;position:relative;overflow:hidden}
.quiz-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(108,99,255,0.3)}
.quiz-btn:active{transform:scale(0.96)}
.quiz-btn:disabled{opacity:0.4;cursor:not-allowed}

/* Schedule Peek */
.peek-overlay{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,0.55);backdrop-filter:blur(8px);animation:overlayIn .2s ease}
.peek-panel{position:fixed;bottom:0;left:0;right:0;z-index:51;background:linear-gradient(180deg,#0f0f1a 0%,#0a0a0a 100%);border-top:1px solid rgba(108,99,255,0.15);border-radius:24px 24px 0 0;max-height:65vh;overflow-y:auto;padding:16px 20px 24px;animation:peekSlideUp .35s cubic-bezier(0.16,1,0.3,1)}
.peek-handle{width:40px;height:4px;border-radius:4px;background:var(--border);margin:0 auto 16px}
.peek-section{margin-bottom:16px}
.peek-section-title{font-size:0.75rem;color:var(--text-dim);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.peek-timeline-slot{display:flex;gap:10px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:0.85rem}
.peek-timeline-time{width:55px;flex-shrink:0;color:var(--text-dim);font-size:0.78rem;text-align:right}
.peek-timeline-block{flex:1;padding:4px 10px;border-radius:10px;font-weight:500}
.peek-task-item{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:0.85rem}
.peek-task-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* Notes Panel */
.notes-panel{position:fixed;bottom:0;left:0;right:0;z-index:51;background:linear-gradient(180deg,#0f0f1a 0%,#0a0a0a 100%);border-top:1px solid rgba(108,99,255,0.15);border-radius:24px 24px 0 0;max-height:70vh;overflow-y:auto;padding:16px 20px 24px;animation:peekSlideUp .35s cubic-bezier(0.16,1,0.3,1)}
.notes-search{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:10px 14px 10px 36px;color:var(--text);font-size:0.88rem;outline:none;margin-bottom:14px;transition:border-color .15s}
.notes-search:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,99,255,0.12),0 0 20px rgba(108,99,255,0.06)}
.notes-search-wrap{position:relative;margin-bottom:14px}
.notes-search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:0.85rem;opacity:0.4;pointer-events:none}
.notes-list{display:flex;flex-direction:column;gap:8px}
.notes-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;cursor:pointer;transition:all .25s cubic-bezier(0.16,1,0.3,1);animation:floatUp .3s ease both}
.notes-item:hover{border-color:var(--accent-dim);background:rgba(108,99,255,0.03);transform:translateY(-1px);box-shadow:0 4px 16px rgba(108,99,255,0.06)}
.notes-item.expanded{border-color:var(--accent-dim)}
.notes-item-header{display:flex;align-items:center;justify-content:space-between;gap:8px}
.notes-item-name{font-weight:700;font-size:0.88rem;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.notes-item-meta{display:flex;align-items:center;gap:6px;flex-shrink:0}
.notes-badge{font-size:0.65rem;font-weight:700;padding:2px 7px;border-radius:6px;text-transform:uppercase;letter-spacing:0.3px}
.notes-badge-pdf{background:rgba(255,71,87,0.12);color:var(--danger)}
.notes-badge-docs{background:rgba(69,170,242,0.12);color:var(--blue)}
.notes-badge-ai{background:rgba(108,99,255,0.12);color:var(--accent)}
.notes-item-date{font-size:0.72rem;color:var(--text-dim)}
.notes-item-preview{font-size:0.82rem;color:var(--text-dim);margin-top:8px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.notes-item-content{font-size:0.84rem;color:var(--text);margin-top:10px;line-height:1.6;white-space:pre-wrap;word-break:break-word;max-height:400px;overflow-y:auto;padding:10px 12px;background:var(--bg);border-radius:8px;border:1px solid rgba(255,255,255,0.04)}
.notes-match{background:rgba(108,99,255,0.3);border-radius:2px;padding:0 2px}
.notes-delete{background:transparent;border:1px solid rgba(255,71,87,0.25);color:var(--danger);border-radius:6px;padding:3px 8px;font-size:0.72rem;font-weight:600;cursor:pointer;transition:all .15s;flex-shrink:0}
.notes-delete:hover{background:rgba(255,71,87,0.1);border-color:var(--danger)}
.notes-empty{text-align:center;padding:40px 20px;color:var(--text-dim);font-size:0.88rem;line-height:1.6}

/* Auth Screen */
.auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:24px;text-align:center;background:transparent}
.auth-form{background:linear-gradient(145deg,#1a1a2e 0%,#0f0f1a 100%);border:1px solid rgba(108,99,255,0.12);border-radius:24px;padding:32px 28px;width:100%;max-width:360px;animation:scaleIn .4s cubic-bezier(0.16,1,0.3,1)}
.auth-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:12px 16px;color:var(--text);font-size:0.92rem;outline:none;margin-bottom:12px;transition:border-color .25s ease,box-shadow .25s ease}
.auth-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,99,255,0.12),0 0 20px rgba(108,99,255,0.06)}
.auth-btn{width:100%;padding:12px;border-radius:14px;border:none;font-weight:700;font-size:0.95rem;cursor:pointer;transition:all .15s;margin-bottom:8px}
.auth-btn:active{transform:scale(0.97)}
.auth-btn-primary{background:linear-gradient(135deg,var(--accent) 0%,#5a54d4 100%);color:#fff;box-shadow:0 2px 8px rgba(108,99,255,0.2)}
.auth-btn-secondary{background:transparent;border:1px solid var(--border);color:var(--text-dim)}
.auth-error{background:rgba(255,71,87,0.1);border:1px solid rgba(255,71,87,0.25);color:var(--danger);padding:10px 14px;border-radius:14px;font-size:0.84rem;margin-bottom:12px}
.auth-divider{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--text-dim);font-size:0.78rem}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* Sync indicator */
.sync-dot{width:6px;height:6px;border-radius:3px;display:inline-block;margin-right:4px}
.sync-saving{background:var(--warning);animation:gentlePulse 1s infinite}
.sync-saved{background:var(--success)}
.sync-error{background:var(--danger)}

/* Google Import Modal */
.g-overlay{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,0.55);backdrop-filter:blur(8px);animation:overlayIn .2s ease}
@keyframes overlayIn{from{opacity:0}to{opacity:1}}
.g-modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:51;background:linear-gradient(180deg,#0f0f1a 0%,#0a0a0a 100%);border:1px solid rgba(108,99,255,0.12);border-radius:24px;width:min(92vw,440px);max-height:82vh;overflow-y:auto;padding:20px;animation:scaleIn .3s cubic-bezier(0.16,1,0.3,1)}
.g-modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.g-modal-title{font-size:1.05rem;font-weight:700;display:flex;align-items:center;gap:8px}
.g-modal-close{background:transparent;border:none;color:var(--text-dim);cursor:pointer;line-height:1;padding:4px;border-radius:6px;transition:color .15s;display:flex;align-items:center;justify-content:center}
.g-modal-close:hover{color:var(--text)}
.g-connected{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:rgba(46,213,115,0.06);border:1px solid rgba(46,213,115,0.2);border-radius:14px;margin-bottom:12px;font-size:0.8rem}
.g-tabs{display:flex;gap:4px;margin-bottom:14px;background:var(--bg2);border-radius:14px;padding:3px}
.g-tab{flex:1;padding:8px 4px;border:none;border-radius:12px;cursor:pointer;font-size:0.8rem;font-weight:600;background:transparent;color:var(--text-dim);transition:all .15s}
.g-tab.active{background:var(--accent);color:#fff}
.g-section{padding:2px 0}
.g-btn{width:100%;padding:12px 14px;border-radius:14px;border:1px solid var(--border);background:var(--bg2);color:var(--text);cursor:pointer;font-weight:600;font-size:0.88rem;transition:all .15s;margin-bottom:8px;text-align:left;display:flex;align-items:center;gap:8px}
.g-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(108,99,255,0.05)}
.g-btn:disabled{opacity:.5;cursor:not-allowed}
.g-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:10px 14px;color:var(--text);font-size:0.88rem;outline:none;margin-bottom:8px;transition:border-color .15s}
.g-input:focus{border-color:var(--accent)}
.g-divider{text-align:center;color:var(--text-dim);font-size:0.78rem;margin:6px 0}
.g-event-row{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border:1px solid var(--border);border-radius:14px;margin-bottom:6px;cursor:pointer;transition:border-color .15s}
.g-event-row:hover{border-color:var(--accent-dim)}
.g-check{width:18px;height:18px;min-width:18px;border-radius:5px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:1px}
.g-check.on{background:var(--accent);border-color:var(--accent)}
.g-event-title{font-size:0.85rem;font-weight:600;line-height:1.3}
.g-event-sub{font-size:0.75rem;color:var(--text-dim);margin-top:2px}
.g-action-row{display:flex;gap:8px;margin-top:4px}
.g-err{background:rgba(255,71,87,0.08);border:1px solid rgba(255,71,87,0.25);color:var(--danger);padding:8px 12px;border-radius:14px;font-size:0.82rem;margin-bottom:10px}
.g-note{font-size:0.8rem;color:var(--text-dim);margin-bottom:10px;line-height:1.5}
.g-status{text-align:center;padding:16px;font-size:0.82rem;color:var(--text-dim)}
.g-hdr-btn{background:rgba(108,99,255,0.1);border:1px solid rgba(108,99,255,0.25);color:var(--accent);cursor:pointer;border-radius:8px;padding:5px 10px;font-size:0.78rem;font-weight:600;transition:all .2s;display:flex;align-items:center;gap:4px}
.g-hdr-btn:hover{background:rgba(108,99,255,0.2)}
.g-hdr-btn.connected{background:rgba(46,213,115,0.1);border-color:rgba(46,213,115,0.3);color:var(--success)}
/* Calendar auto-sync card */
.cal-sync-card{padding:12px 14px;border-radius:16px;border:1px solid var(--border);background:var(--bg2);margin-bottom:14px;transition:border-color .2s,background .2s}
.cal-sync-card.on{border-color:rgba(46,213,115,0.4);background:rgba(46,213,115,0.04)}
.cal-sync-card.error{border-color:rgba(255,71,87,0.4);background:rgba(255,71,87,0.04)}
.cal-sync-toggle{display:flex;align-items:center;justify-content:space-between;gap:10px}
.cal-sync-pill{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;border:none;cursor:pointer;font-size:0.78rem;font-weight:700;transition:all .2s}
.cal-sync-pill.on{background:var(--success);color:#fff}
.cal-sync-pill.off{background:var(--bg);border:1px solid var(--border);color:var(--text-dim)}
/* Drive Picker UI */
.g-picker-btn{width:100%;padding:16px 14px;border-radius:16px;border:2px dashed var(--border);background:var(--bg2);color:var(--text);cursor:pointer;font-weight:600;font-size:0.88rem;transition:all .2s;margin-bottom:8px;text-align:left;display:flex;align-items:center;gap:12px}
.g-picker-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(108,99,255,0.06);border-style:solid}
.g-picker-btn:disabled{opacity:.5;cursor:not-allowed}
.g-picked-file{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(108,99,255,0.08);border:1px solid rgba(108,99,255,0.3);border-radius:14px;margin-bottom:8px;animation:fadeIn .2s ease}

/* Fullscreen panels */
.notes-panel.fullscreen,.peek-panel.fullscreen{position:fixed;inset:0;max-height:100vh;border-radius:0;z-index:100;padding:20px 24px 24px;animation:overlayIn .2s ease}

/* Notes editing */
.notes-new-btn{background:linear-gradient(135deg,var(--accent) 0%,#5a54d4 100%);background-size:200% 200%;color:#fff;border:none;border-radius:14px;padding:7px 14px;font-size:0.82rem;font-weight:600;cursor:pointer;transition:all .2s cubic-bezier(0.16,1,0.3,1);display:flex;align-items:center;gap:5px;box-shadow:0 2px 8px rgba(108,99,255,0.2);animation:gradientShift 4s ease infinite}
.notes-new-btn:hover{filter:brightness(1.1)}
.notes-new-btn:active{transform:scale(0.96)}
.notes-title-input{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:8px 12px;color:var(--text);font-size:0.92rem;font-weight:700;outline:none;width:100%;margin-bottom:8px;transition:border-color .15s}
.notes-title-input:focus{border-color:var(--accent)}
.notes-toolbar{display:flex;gap:4px;padding:6px 8px;background:var(--bg2);border:1px solid var(--border);border-radius:14px 14px 0 0;flex-wrap:wrap;align-items:center}
.notes-toolbar-btn{background:transparent;border:1px solid var(--border);color:var(--text-dim);border-radius:8px;padding:4px 8px;font-size:0.78rem;cursor:pointer;transition:all .15s;min-width:28px;text-align:center;font-weight:600;line-height:1}
.notes-toolbar-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(108,99,255,0.06)}
.notes-toolbar-btn.active{background:rgba(108,99,255,0.15);border-color:var(--accent);color:var(--accent)}
.notes-toolbar-sep{width:1px;height:18px;background:var(--border);margin:0 4px}
.notes-editor{min-height:180px;max-height:50vh;overflow-y:auto;padding:12px 14px;background:var(--bg);border:1px solid var(--border);border-top:none;border-radius:0 0 14px 14px;color:var(--text);font-size:0.88rem;line-height:1.65;outline:none;word-break:break-word}
.notes-editor:focus{border-color:var(--accent)}
.notes-editor:empty::before{content:attr(data-placeholder);color:var(--text-dim);opacity:0.5}
.notes-edit-actions{display:flex;gap:8px;margin-top:10px;justify-content:flex-end}
.notes-save-btn{background:var(--accent);color:#fff;border:none;border-radius:12px;padding:7px 16px;font-size:0.82rem;font-weight:600;cursor:pointer;transition:all .15s}
.notes-save-btn:hover{filter:brightness(1.1)}
.notes-cancel-btn{background:transparent;border:1px solid var(--border);color:var(--text-dim);border-radius:12px;padding:7px 16px;font-size:0.82rem;font-weight:600;cursor:pointer;transition:all .15s}
.notes-cancel-btn:hover{border-color:var(--accent);color:var(--text)}
.notes-fs-btn{background:transparent;border:1px solid var(--border);color:var(--text-dim);border-radius:10px;padding:4px 8px;cursor:pointer;font-size:0.85rem;transition:all .15s}
.notes-fs-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Calendar month grid */
.cal-month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-month-title{font-size:1.1rem;font-weight:700}
.cal-nav-btn{background:transparent;border:1px solid var(--border);color:var(--text-dim);border-radius:10px;padding:6px 12px;cursor:pointer;font-size:0.85rem;transition:all .15s}
.cal-nav-btn:hover{border-color:var(--accent);color:var(--accent)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-day-header{text-align:center;font-size:0.72rem;font-weight:600;color:var(--text-dim);padding:6px 2px;text-transform:uppercase}
.cal-cell{min-height:70px;padding:4px 6px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;font-size:0.78rem;overflow:hidden;transition:border-color .15s;cursor:default}
.cal-cell:hover{border-color:var(--accent-dim)}
.cal-cell.other-month{opacity:0.35}
.cal-cell.today{border-color:var(--accent);background:rgba(108,99,255,0.06)}
.cal-cell-date{font-weight:600;margin-bottom:2px;font-size:0.75rem}
.cal-cell-event{font-size:0.65rem;padding:1px 4px;border-radius:6px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-cell-event.task{background:rgba(108,99,255,0.15);color:var(--accent)}
.cal-cell-event.event{background:rgba(46,213,115,0.15);color:var(--success)}
.cal-cell-event.overdue{background:rgba(255,71,87,0.15);color:var(--danger)}
.cal-cell-event.block{background:rgba(69,170,242,0.15);color:var(--blue)}
.cal-cell-more{font-size:0.6rem;color:var(--text-dim);margin-top:1px}

/* Chat sidebar */
@keyframes sidebarSlideIn{from{transform:translateX(-100%)}to{transform:translateX(0)}}
@keyframes sidebarSlideOut{from{transform:translateX(0)}to{transform:translateX(-100%)}}
.chat-sidebar-overlay{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,0.55);backdrop-filter:blur(8px);animation:overlayIn .2s ease}
.chat-sidebar{position:fixed;top:0;left:0;bottom:0;width:min(85vw,340px);z-index:61;background:linear-gradient(180deg,rgba(15,15,26,0.98) 0%,rgba(10,10,10,0.98) 100%);border-right:1px solid rgba(108,99,255,0.1);padding:16px;overflow-y:auto;animation:sidebarSlideIn .3s cubic-bezier(0.16,1,0.3,1);backdrop-filter:blur(12px)}
.chat-sidebar-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.chat-sidebar-title{font-weight:700;font-size:1rem;display:flex;align-items:center;gap:8px}
.chat-sidebar-empty{text-align:center;padding:40px 16px;color:var(--text-dim);font-size:0.85rem}
.chat-sidebar-list{display:flex;flex-direction:column;gap:8px}
.chat-sidebar-item{background:linear-gradient(145deg,var(--bg2) 0%,rgba(26,26,46,0.6) 100%);border:1px solid rgba(108,99,255,0.08);border-radius:var(--radius);padding:12px 14px;cursor:pointer;transition:all .25s cubic-bezier(0.16,1,0.3,1);animation:floatUp .3s ease both}
.chat-sidebar-item:hover{border-color:var(--accent-dim);background:linear-gradient(145deg,rgba(108,99,255,0.06) 0%,rgba(26,26,46,0.8) 100%);transform:translateY(-1px)}
.chat-sidebar-item.active{border-color:var(--accent);background:rgba(108,99,255,0.06)}
.chat-sidebar-item-title{font-weight:600;font-size:0.88rem;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-sidebar-item-meta{display:flex;align-items:center;justify-content:space-between;font-size:0.72rem;color:var(--text-dim)}
.chat-sidebar-item-delete{background:transparent;border:1px solid rgba(255,71,87,0.25);color:var(--danger);border-radius:6px;padding:2px 8px;font-size:0.7rem;font-weight:600;cursor:pointer;transition:all .15s}
.chat-sidebar-item-delete:hover{background:rgba(255,71,87,0.1);border-color:var(--danger)}

/* Responsive */
@media(max-width:768px){
  .sos-bubble{max-width:88%}
  .sos-header h1{font-size:1rem!important}
  .peek-panel{max-height:75vh}
  .cal-cell{min-height:55px}
  .cal-cell-event{font-size:0.6rem}
}
@media(max-width:500px){
  .sos-input-area{padding:6px 10px 10px}
  .sos-bubble{max-width:92%;font-size:0.88rem}
  .sos-chip{font-size:0.78rem;padding:5px 11px}
  .auth-form{padding:24px 20px}
  .cal-cell{min-height:45px;padding:2px 3px}
  .cal-cell-date{font-size:0.68rem}
  .cal-cell-event{font-size:0.58rem}
  .notes-editor{min-height:120px}
}
/* Photo in chat */
.sos-bubble img[alt="photo"]{transition:opacity .15s}
.sos-bubble img[alt="photo"]:hover{opacity:0.85}

input:focus,select:focus,textarea:focus{border-color:var(--accent)!important;box-shadow:0 0 0 2px rgba(108,99,255,0.2),0 0 20px rgba(108,99,255,0.05)}
button:hover{opacity:0.88}
button:active{transform:scale(0.97)}
select option{background:#0f0f23;color:var(--text)}

/* ── Voice Circle Overlay ── */
.voice-overlay{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,5,15,0.9);backdrop-filter:blur(18px);animation:overlayIn .35s ease;cursor:pointer;user-select:none}
.voice-rings{position:relative;display:flex;align-items:center;justify-content:center;width:300px;height:300px}
.voice-ring{position:absolute;border-radius:50%;will-change:transform}
.voice-ring-1{width:300px;height:300px;border:1px solid rgba(108,99,255,0.12)}
.voice-ring-2{width:228px;height:228px;border:1px solid rgba(108,99,255,0.22);box-shadow:inset 0 0 50px rgba(108,99,255,0.04)}
.voice-ring-3{width:162px;height:162px;border:1.5px solid rgba(108,99,255,0.38);box-shadow:inset 0 0 30px rgba(108,99,255,0.07),0 0 24px rgba(108,99,255,0.08)}
.voice-ring-4{width:110px;height:110px;border:2px solid rgba(108,99,255,0.55);background:rgba(108,99,255,0.07);box-shadow:inset 0 0 24px rgba(108,99,255,0.12),0 0 32px rgba(108,99,255,0.12)}
.voice-center{width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,var(--accent) 0%,#5a54d4 100%);display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 0 32px rgba(108,99,255,0.65),0 0 72px rgba(108,99,255,0.28),inset 0 1px 0 rgba(255,255,255,0.18)}
</style>

/* ─── Date helpers ─── */
function fmt(d) { return new Date(d).toLocaleDateString('en-US', { month:'short', day:'numeric' }); }
function fmtFull(d) { return new Date(d).toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric' }); }
function toDateStr(d) {
  const dt = new Date(d);
  return dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');
}
function today() { return toDateStr(new Date()); }
function daysUntil(dateStr) {
  const now = new Date(); now.setHours(0,0,0,0);
  const target = new Date(dateStr + 'T00:00:00');
  return Math.round((target - now) / 86400000);
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function fmtTime(h, m) {
  const hr = h > 12 ? h - 12 : h === 0 ? 12 : h;
  const ampm = h >= 12 ? 'PM' : 'AM';
  return hr + ':' + String(m).padStart(2,'0') + ' ' + ampm;
}

/* ─── Collapse a {HH:MM: {name}} slot map into "Name HH:MM-HH:MM" strings ─── */
function summarizeBlockSlots(slotMap) {
  const entries = Object.entries(slotMap).filter(([,v]) => v).sort(([a],[b]) => a.localeCompare(b));
  if (!entries.length) return [];
  const ranges = [];
  let curName = null, startKey = null, prevKey = null;
  const advance = key => { const [h,m] = key.split(':').map(Number); return String(m===30?h+1:h).padStart(2,'0')+':'+(m===30?'00':'30'); };
  for (const [key, val] of entries) {
    const name = val?.name || String(val);
    if (name !== curName) {
      if (curName !== null) ranges.push(curName + ' ' + startKey + '-' + advance(prevKey));
      curName = name; startKey = key;
    }
    prevKey = key;
  }
  if (curName !== null) ranges.push(curName + ' ' + startKey + '-' + advance(prevKey));
  return ranges;
}

/* ─── Nudge Engine ─── */
function getNudge(task) {
  if (task.status === 'done') return { emoji:'done', text:'Done! Nice work.' };
  const d = daysUntil(task.dueDate);
  if (d < 0) return { emoji:'overdue', text:'Overdue by ' + Math.abs(d) + ' day' + (Math.abs(d)>1?'s':'') };
  if (d === 0) return { emoji:'today', text:'Due today' };
  if (d === 1) return { emoji:'tomorrow', text:'Due tomorrow' };
  if (d <= 3) return { emoji:'soon', text:d + ' days left' };
  if (d <= 7) return { emoji:'week', text:d + ' days left' };
  return { emoji:'chill', text:d + ' days left' };
}

function getPriority(task) {
  if (task.status === 'done') return 999;
  const d = daysUntil(task.dueDate);
  let score = d;
  if (task.status === 'not_started') score -= 2;
  if (task.status === 'in_progress') score -= 1;
  return score;
}

/* ─── Photo utilities ─── */
function resizeImage(file, maxDim = 1024, quality = 0.7) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('Failed to read file'));
    reader.onload = (e) => {
      const img = new Image();
      img.onerror = () => reject(new Error('Failed to load image'));
      img.onload = () => {
        try {
          let { width, height } = img;
          if (width > maxDim || height > maxDim) {
            const ratio = Math.min(maxDim / width, maxDim / height);
            width = Math.round(width * ratio);
            height = Math.round(height * ratio);
          }
          const canvas = document.createElement('canvas');
          canvas.width = width; canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          let dataUrl = canvas.toDataURL('image/jpeg', quality);
          // If still too large (>500KB base64), reduce quality
          if (dataUrl.length > 500000) {
            dataUrl = canvas.toDataURL('image/jpeg', 0.5);
          }
          const base64 = dataUrl.split(',')[1];
          resolve({ base64, preview: dataUrl, mimeType: 'image/jpeg' });
        } catch (err) { reject(err); }
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function uploadPhotoToStorage(base64, userId) {
  try {
    const byteString = atob(base64);
    const ab = new ArrayBuffer(byteString.length);
    const ia = new Uint8Array(ab);
    for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
    const blob = new Blob([ab], { type: 'image/jpeg' });
    const path = userId + '/' + Date.now() + '-' + uid() + '.jpg';
    const { data, error } = await sb.storage.from('chat-photos').upload(path, blob, { contentType: 'image/jpeg' });
    if (error) { console.error('Photo upload error:', error); return null; }
    const { data: urlData } = sb.storage.from('chat-photos').getPublicUrl(path);
    return urlData?.publicUrl || null;
  } catch (e) {
    console.error('Photo upload failed:', e);
    return null;
  }
}

/* ── Name resolver: translates fuzzy AI names → real objects with IDs ── */
// Common abbreviations teens use → expanded form
const SUBJECT_ALIASES = {
  calc:'calculus', math:'mathematics', bio:'biology', chem:'chemistry',
  phys:'physics', eng:'english', hist:'history', sci:'science', span:'spanish',
  econ:'economics', psych:'psychology', gov:'government', geo:'geography',
  pe:'physical education', gym:'physical education', lit:'literature',
  cs:'computer science', comp:'computer science', la:'language arts'
};

const SUBJECT_ALIAS_PATTERNS = Object.entries(SUBJECT_ALIASES).map(
  ([short, long]) => ({ regex: new RegExp('\\b' + short + '\\b', 'g'), replacement: long })
);
function normalize(str) {
  if (!str) return '';
  let s = str.toLowerCase().trim();
  // expand known abbreviations
  for (const { regex, replacement } of SUBJECT_ALIAS_PATTERNS) {
    regex.lastIndex = 0;
    s = s.replace(regex, replacement);
  }
  return s;
}

// Score how well two strings match (higher = better, 0 = no match)
function matchScore(query, target) {
  const q = normalize(query);
  const t = normalize(target);
  if (!q || !t) return 0;
  if (q === t) return 100;               // exact match
  if (t.includes(q)) return 80;          // target contains query ("Math Test" contains "math")
  if (q.includes(t)) return 70;          // query contains target ("cancel the math test" contains "math test")
  // word overlap — how many query words appear in target
  const qWords = q.split(/\s+/);
  const tWords = t.split(/\s+/);
  const overlap = qWords.filter(w => tWords.some(tw => tw.includes(w) || w.includes(tw))).length;
  if (overlap > 0) return 30 + (overlap / qWords.length) * 40;
  return 0;
}

// Find the best-matching event from the array. Returns the event object or null.
function resolveEvent(nameOrId, eventsList) {
  if (!nameOrId || !eventsList?.length) return null;
  // 1. Try exact ID match first
  const byId = eventsList.find(ev => ev.id === nameOrId);
  if (byId) return byId;
  // 2. Score every event by name similarity, pick the best
  let best = null, bestScore = 0;
  for (const ev of eventsList) {
    const s = matchScore(nameOrId, ev.title);
    if (s > bestScore) { bestScore = s; best = ev; }
  }
  return bestScore >= 30 ? best : null;
}

// Find the best-matching task from the array. Returns the task object or null.
function resolveTask(nameOrId, tasksList) {
  if (!nameOrId || !tasksList?.length) return null;
  const byId = tasksList.find(t => t.id === nameOrId);
  if (byId) return byId;
  let best = null, bestScore = 0;
  for (const t of tasksList) {
    const s = matchScore(nameOrId, t.title);
    if (s > bestScore) { bestScore = s; best = t; }
  }
  return bestScore >= 30 ? best : null;
}

  try {
    const endD = new Date(event.date + 'T00:00:00'); endD.setDate(endD.getDate() + 1);
    const endDate = endD.toISOString().split('T')[0];
    const body = { summary: event.title, start: { date: event.date }, end: { date: endDate } };
    if (event.googleId) {
      const res = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events/' + event.googleId, {
        method: 'PATCH', headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!res.ok) { const errBody = await res.text().catch(() => ''); console.error('Google event update failed:', res.status, errBody); return event.googleId; }
      const data = await res.json(); return data.id;
    } else {
      const res = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
        method: 'POST', headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!res.ok) { const errBody = await res.text().catch(() => ''); console.error('Google event create failed:', res.status, errBody); return null; }
      const data = await res.json(); return data.id;
    }
  } catch (e) { console.error('pushEventToGoogle error:', e); return event.googleId || null; }
}

/* ── Migrate localStorage → Supabase (first login) ── */
async function migrateLocalStorage(userId) {
  const migrated = localStorage.getItem('sos_migrated_' + userId);
  if (migrated) return false;

  try {
    // Tasks
    const localTasks = JSON.parse(localStorage.getItem('cc_tasks') || '[]');
    if (localTasks.length > 0) {
      const rows = localTasks.map(t => appTaskToDb(t, userId));
      await sb.from('tasks').upsert(rows, { onConflict: 'id' });
    }

    // Events
    const localEvents = JSON.parse(localStorage.getItem('cc_events') || '[]');
    if (localEvents.length > 0) {
      const rows = localEvents.map(e => appEventToDb(e, userId));
      await sb.from('events').upsert(rows, { onConflict: 'id' });
    }

    // Notes
    const localNotes = JSON.parse(localStorage.getItem('cc_notes') || '[]');
    if (localNotes.length > 0) {
      const rows = localNotes.map(n => appNoteToDb(n, userId));
      await sb.from('notes').upsert(rows, { onConflict: 'id' });
    }

    // Chat messages
    const localChat = JSON.parse(localStorage.getItem('cc_chat') || '[]');
    if (localChat.length > 0) {
      const rows = localChat.map(m => ({ user_id: userId, role: m.role, content: m.content }));
      await sb.from('chat_messages').insert(rows);
    }

    // Blocks (recurring + date overrides)
    const localBlocks = JSON.parse(localStorage.getItem('cc_blocks') || '{"recurring":[],"dates":{}}');
    if (localBlocks.recurring?.length > 0) {
      const rows = localBlocks.recurring.map(rb => ({
        user_id: userId, name: rb.name, category: rb.category || 'school',
        start_time: rb.start || '00:00', end_time: rb.end || '01:00', days: rb.days || []
      }));
      await sb.from('recurring_blocks').insert(rows);
    }
    if (localBlocks.dates && Object.keys(localBlocks.dates).length > 0) {
      const rows = [];
      Object.entries(localBlocks.dates).forEach(([date, slots]) => {
        Object.entries(slots).forEach(([slot, data]) => {
          rows.push({
            user_id: userId, block_date: date, time_slot: slot,
            name: data ? data.name : null, category: data ? (data.category || 'school') : 'school'
          });
        });
      });
      if (rows.length > 0) await sb.from('date_blocks').upsert(rows, { onConflict: 'user_id,block_date,time_slot' });
    }

    // Weather coords
    const localCoords = JSON.parse(localStorage.getItem('cc_weather_coords') || 'null');
    if (localCoords) {
      await sb.from('profiles').update({ weather_lat: localCoords.lat, weather_lon: localCoords.lon }).eq('id', userId);
    }

    localStorage.setItem('sos_migrated_' + userId, 'true');
    console.log('Migration complete');
    return true;
  } catch (e) {
    console.error('Migration error:', e);
    return false;
  }
}

/* ─── Action parser ─── */
function parseActions(text) {
  const actions = []; const regex = /<action>([\s\S]*?)<\/action>/g; let match;
  while ((match = regex.exec(text)) !== null) {
    try { actions.push(JSON.parse(match[1].trim())); } catch (e) { console.error('Failed to parse action:', match[1], e); }
  }
  return actions;
}
function parseActionsDetailed(text) {
  const actions = []; const malformedFragments = [];
  const regex = /<action>([\s\S]*?)<\/action>/g; let match;
  while ((match = regex.exec(text)) !== null) {
    const raw = match[1].trim();
    try { actions.push(JSON.parse(raw)); } catch (e) { console.error('Malformed action JSON:', raw, e); malformedFragments.push(raw); }
  }
  return { actions, malformedFragments };
}
async function parseActionsWithRecovery(rawContent, token) {
  const { actions, malformedFragments } = parseActionsDetailed(rawContent);
  if (malformedFragments.length === 0) return actions;
  console.warn('Attempting JSON recovery for', malformedFragments.length, 'malformed fragment(s)');
  try {
    const fixPrompt = 'Fix the following malformed JSON action tags. Return ONLY valid <action>JSON</action> tags, nothing else.\n\nMalformed fragments:\n' +
      malformedFragments.map((f, i) => 'Fragment ' + (i+1) + ': ' + f).join('\n') +
      '\n\nRules:\n- Fix syntax errors (missing quotes, trailing commas, unescaped characters)\n- Do NOT change the intent or values — only fix the JSON syntax\n- Return each fixed action in <action>...</action> tags';
    const response = await fetch(EDGE_FN_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+(token||SUPABASE_ANON_KEY)},
      body:JSON.stringify({ systemPrompt:fixPrompt, messages:[{role:'user',content:'Fix the JSON above.'}], maxTokens:512, model:'llama-3.1-8b-instant', provider:'groq', isContentGen:false })
    });
    if (response.ok) {
      const data = await response.json();
      const fixedActions = parseActions(data?.content || '');
      return [...actions, ...fixedActions];
    }
  } catch (e) { console.error('JSON recovery re-prompt failed:', e); }
  return actions;
}

/* ─── Google Docs text extractor (shared by import modal + daily brief) ─── */
function extractDocsText(doc) {
  const parts = [];
  function walkContent(content) {
    for (const block of (content || [])) {
      if (block.paragraph) {
        const line = (block.paragraph.elements || [])
          .map(el => el.textRun?.content || '')
          .join('');
        parts.push(line);
      } else if (block.table) {
        for (const row of (block.table.tableRows || [])) {
          for (const cell of (row.tableCells || [])) {
            walkContent(cell.content);
          }
        }
      }
    }
  }
  walkContent(doc.body?.content);
  return parts.join('').trim();
}

/* ─── Google Doc ID parser (shared by import modal + daily brief context) ─── */
// Accepts a full Google Docs URL or a bare doc ID; returns the ID or null.
function parseDocId(input) {
  const urlMatch = input.match(/\/document\/d\/([a-zA-Z0-9_-]+)/);
  if (urlMatch) return urlMatch[1];
  const trimmed = input.trim();
  if (/^[a-zA-Z0-9_-]{10,}$/.test(trimmed)) return trimmed;
  return null;
}

    return { provider:'gemini', model:'gemini-2.5-flash', tier:2, isContentGen:true, maxTokens:4096 };

  if (/\b(notes?|reference|look\s*up|search\s+(my\s+)?notes|find\s+in|from\s+(my|the)\s+(pdf|doc|notes?)|what\s+(does|did)\s+(my|the)\s+(pdf|doc|notes?)|in\s+my\s+(pdf|doc|notes?))\b/i.test(text)) {
    return { provider:'gemini', model:'gemini-2.5-flash', tier:2, isContentGen:false, maxTokens:2048 };
  }
  const actionSignals = /\b(mon|tue|wed|thu|fri|sat|sun|monday|tuesday|wednesday|thursday|friday|saturday|sunday|tmrw|tmw|2morrow|tomorrow|tonight|today|this\s+week|next\s+week|\d{1,2}(am|pm|:\d\d))\b|\b(test|exam|quiz|hw|homework|essay|project|lab|report|presentation|practice|game|match|meet|tournament|scrimmage|tryout|rehearsal|class|lesson|club|appointment|deadline|due|midterm|final|paper|assignment|worksheet)\b|\b(add|schedule|remind|mark|cancel|remove|delete|clear|scratch|drop|ditch|wipe|axe|nix|scrap|erase|purge|yeet|bin|toss|dump|trash|strike|pull|cut|move|reschedule|push\s*back|postpone|bump|finish|done|completed|finished|turned\s+in|submitted|started|working\s+on|nevermind|never\s*mind|forget)\b|\b(no\s+longer|not\s+happening|called\s+off|scratch\s+that|off\s+the\s+books|take\s+off|cross\s+out)\b|\b(calc|math|bio|chem|phys|eng|hist|sci|span|french|econ|psych|gov|geo|ap\s+\w+|pe|gym)\b|\b(swim|debate|band|choir|track|soccer|basketball|baseball|football|tennis|volleyball|lacrosse|dance|drama|robotics|chess|music|tutoring)\b/i;
  if (actionSignals.test(text)) {
    return { provider:'gemini', model:'gemini-2.5-flash', tier:2, isContentGen:false, maxTokens:1024 };
  }
  return { provider:'groq', model:'llama-3.1-8b-instant', tier:1, isContentGen:false, maxTokens:1024 };
}

/* LLM-based classifier using llama-3.1-8b-instant (with regex fallback) */
async function classifyMessage(text) {
  try {
    const session = await sb.auth.getSession();
    const token = session?.data?.session?.access_token;
    const classifyPrompt = `You are a message classifier for a student planner app. Classify the user message into exactly one category and return ONLY a JSON object.

Categories:
- CONTENT_GEN: Requests to create study materials — flashcards, outlines, summaries, study plans, quizzes, project breakdowns, review sheets, cheat sheets
- NOTES_REF: Questions about the student's own notes, reference docs, PDFs, or looking things up in saved documents
- ACTION: Any scheduling, task, event, block, calendar, or organizational request. Includes mentions of dates, times, school subjects, activities, verbs like add/delete/schedule/cancel/move, and slang equivalents
- CHAT: General conversation, greetings, questions, or anything with no scheduling or content generation intent

Return ONLY: {"category":"CONTENT_GEN"} or {"category":"NOTES_REF"} or {"category":"ACTION"} or {"category":"CHAT"}`;

    const response = await fetch(EDGE_FN_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+(token||SUPABASE_ANON_KEY)},
      body:JSON.stringify({
        systemPrompt:classifyPrompt,
        messages:[{role:'user',content:text}],
        maxTokens:32,
        model:'llama-3.1-8b-instant',
        provider:'groq',
        isContentGen:false
      })
    });
    if (!response.ok) throw new Error('Classification request failed');
    const data = await response.json();
    const raw = (data?.content || '').trim();
    const jsonStr = raw.replace(/^```json?\s*/i,'').replace(/\s*```$/,'');
    const result = JSON.parse(jsonStr);
    switch (result.category) {
      case 'CONTENT_GEN': return { provider:'gemini', model:'gemini-2.5-flash', tier:2, isContentGen:true, maxTokens:4096 };
      case 'NOTES_REF':   return { provider:'gemini', model:'gemini-2.5-flash', tier:2, isContentGen:false, maxTokens:2048 };
      case 'ACTION':      return { provider:'gemini', model:'gemini-2.5-flash', tier:2, isContentGen:false, maxTokens:1024 };
      default:            return { provider:'groq', model:'llama-3.1-8b-instant', tier:1, isContentGen:false, maxTokens:1024 };
    }
  } catch (e) {
    console.warn('LLM classification failed, using regex fallback:', e);
    return classifyMessageRegex(text);
  }
}

/* ─── Fail-safe: extract action from user message if AI missed ─── */
function inferActionFromMessage(text) {
  const dayMap = {
    'mon':'Monday','tue':'Tuesday','wed':'Wednesday','thu':'Thursday',
    'fri':'Friday','sat':'Saturday','sun':'Sunday',
    'monday':'Monday','tuesday':'Tuesday','wednesday':'Wednesday',
    'thursday':'Thursday','friday':'Friday','saturday':'Saturday','sunday':'Sunday',
    'tmrw':'tomorrow','tmw':'tomorrow','2morrow':'tomorrow','tomorrow':'tomorrow',
    'today':'today','2day':'today'
  };

  let inferredDate = null;
  // Check for "next week" first
  if (/next\s+week/i.test(text)) {
    const d = new Date(); d.setDate(d.getDate() + 7);
    inferredDate = toDateStr(d);
  } else {
    for (const [abbr, full] of Object.entries(dayMap)) {
      if (new RegExp('\\b' + abbr + '\\b', 'i').test(text)) {
        if (full === 'today') {
          inferredDate = today();
        } else if (full === 'tomorrow') {
          const d = new Date(); d.setDate(d.getDate() + 1);
          inferredDate = toDateStr(d);
        } else {
          const dayIndex = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'].indexOf(full);
          const d = new Date(); const current = d.getDay();
          let diff = dayIndex - current;
          if (diff <= 0) diff += 7;
          d.setDate(d.getDate() + diff);
          inferredDate = toDateStr(d);
        }
        break;
      }
    }
  }

  // Classify as event vs task
  const eventWords = /\b(test|exam|quiz|game|match|practice|rehearsal|tryout|meet|tournament|scrimmage|recital|lesson|appointment|meeting|class)\b/i;
  const taskWords = /\b(hw|homework|essay|project|paper|assignment|lab|report|presentation|reading|worksheet|finish|complete|do|write|study)\b/i;

  // ── Check for remove/delete intent FIRST (before add logic) ──
  const removeSignals = /\b(cancel|remove|delete|clear|scratch|drop|ditch|wipe|axe|nix|scrap|erase|purge|yeet|bin|toss|dump|trash|strike|cut|forget|nevermind|never\s*mind)\b/i;
  const removePhrases = /\b(no\s+longer|not\s+happening|called\s+off|scratch\s+that|off\s+the\s+books|take\s+off|cross\s+out|get\s+rid\s+of)\b/i;

  if (removeSignals.test(text) || removePhrases.test(text)) {
    let removeTitle = text.trim()
      .replace(/\b(cancel|remove|delete|clear|scratch|drop|ditch|wipe|axe|nix|scrap|erase|purge|yeet|bin|toss|dump|trash|strike|cut|forget|nevermind|never\s*mind|no\s+longer|not\s+happening|called\s+off|scratch\s+that|off\s+the\s+books|take\s+off|cross\s+out|get\s+rid\s+of|got|it's|isn't|is)\b/gi, ' ')
      .replace(/\b(my|the|a|an|that|this|about|it|from|off|of)\b/gi, ' ')
      .replace(/\b(mon|tue|wed|thu|fri|sat|sun|monday|tuesday|wednesday|thursday|friday|saturday|sunday|tmrw|tmw|2morrow|tomorrow|today|2day|next\s+week)\b/gi, ' ')
      .replace(/\s+/g, ' ').trim();
    if (removeTitle) removeTitle = removeTitle.charAt(0).toUpperCase() + removeTitle.slice(1);
    if (removeTitle && removeTitle.length >= 2) {
      if (taskWords.test(text)) {
        return { type:'delete_task', title:removeTitle.substring(0,60) };
      }
      return { type:'delete_event', title:removeTitle.substring(0,60) };
    }
  }

  // Try to build a title — strip scheduling noise
  let title = text.trim()
    .replace(/\b(add|create|schedule|put|mark|set\s*up|log|i\s+have|i('ve|\s+got)|got|gotta|need\s*to|have\s*to|hafta|remind\s+me\s+to|remind\s+me\s+about|on|at|by|due|this|next|my|a|an|the|for|to)\b/gi, ' ')
    .replace(/\b(mon|tue|wed|thu|fri|sat|sun|monday|tuesday|wednesday|thursday|friday|saturday|sunday|tmrw|tmw|2morrow|tomorrow|today|2day|next\s+week)\b/gi, ' ')
    .replace(/\s+/g, ' ').trim();
  if (title) title = title.charAt(0).toUpperCase() + title.slice(1);
  if (!title || title.length < 2) title = 'Untitled';

  // Detect subject abbreviations
  const subjectMap = {
    'calc':'Calculus','math':'Math','bio':'Biology','chem':'Chemistry',
    'phys':'Physics','eng':'English','hist':'History','sci':'Science',
    'span':'Spanish','french':'French','econ':'Economics','psych':'Psychology',
    'gov':'Government','geo':'Geography'
  };
  let subject = '';
  for (const [abbr, full] of Object.entries(subjectMap)) {
    if (new RegExp('\\b' + abbr + '\\b', 'i').test(text)) { subject = full; break; }
  }

  if (eventWords.test(text)) {
    return {
      type:'add_event', title:title.substring(0,60), date:inferredDate||today(),
      event_type:/test|exam|quiz/i.test(text)?'test':/practice|rehearsal|tryout|game|match|meet|tournament|scrimmage/i.test(text)?'practice':'event',
      subject
    };
  }

  if (taskWords.test(text) || /\bdue\b/i.test(text)) {
    return { type:'add_task', title:title.substring(0,60), subject, due:inferredDate||today(), estimated_minutes:30 };
  }

  // If we found a date but can't tell event vs task, default to event
  if (inferredDate) {
    return { type:'add_event', title:title.substring(0,60), date:inferredDate, event_type:'other', subject };
  }

  return null;
}

/* ═══════════════════════════════════════════════
   AUTH SCREEN
   ═══════════════════════════════════════════════ */
function AuthModal({ onAuth, onClose }) {
  const [mode, setMode] = useState('login');
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [displayName, setDisplayName] = useState('');
  const [error, setError] = useState(null);
  const [loading, setLoading] = useState(false);

  async function handleGoogleSignIn() {
    setError(null);
    setLoading(true);
    try {
      const { error: err } = await sb.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + window.location.pathname }
      });
      if (err) throw err;
    } catch (err) {
      setError(err.message || 'Google sign-in failed');
      setLoading(false);
    }
  }

  async function handleSubmit(e) {
    e.preventDefault();
    setError(null);
    setLoading(true);
    try {
      if (mode === 'signup') {
        const { data, error: err } = await sb.auth.signUp({
          email, password,
          options: { data: { display_name: displayName || 'Student' } }
        });
        if (err) throw err;
        if (data.user) {
          if (data.session) {
            onAuth(data.user);
          } else {
            setError(null);
            setMode('check-email');
          }
        }
      } else {
        const { data, error: err } = await sb.auth.signInWithPassword({ email, password });
        if (err) throw err;
        if (data.user) onAuth(data.user);
      }
    } catch (err) {
      setError(err.message || 'Something went wrong');
    } finally {
      setLoading(false);
    }
  }

  if (mode === 'check-email') {
    return (
      <div className="g-overlay" onClick={onClose}>
        <div className="g-modal" onClick={e=>e.stopPropagation()} style={{textAlign:'center'}}>
          <div style={{marginBottom:8,color:'var(--accent)',display:'flex',justifyContent:'center'}}>{Icon.mail(32)}</div>
          <div style={{fontSize:'1.1rem',fontWeight:700,marginBottom:8}}>Check your email</div>
          <div style={{fontSize:'0.88rem',color:'var(--text-dim)',marginBottom:20,lineHeight:1.5}}>
            We sent a confirmation link to <strong style={{color:'var(--text)'}}>{email}</strong>. Click it, then come back and log in.
          </div>
          <button className="auth-btn auth-btn-primary" onClick={()=>setMode('login')}>
            Back to login
          </button>
        </div>
      </div>
    );
  }

  return (
    <div className="g-overlay" onClick={onClose}>
      <div className="g-modal" onClick={e=>e.stopPropagation()} style={{padding:'28px 24px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div>
            <div style={{fontSize:'1.1rem',fontWeight:700}}>{mode === 'login' ? 'Welcome back' : 'Create your account'}</div>
            <div style={{fontSize:'0.8rem',color:'var(--text-dim)',marginTop:2}}>Sign in to save your data across devices</div>
          </div>
          <button className="g-modal-close" onClick={onClose}>{Icon.x(16)}</button>
        </div>

        {error && <div className="auth-error">{error}</div>}

        <button type="button" onClick={handleGoogleSignIn} disabled={loading}
          style={{width:'100%',padding:'12px',borderRadius:10,border:'1px solid var(--border)',background:'var(--bg2)',color:'var(--text)',cursor:loading?'not-allowed':'pointer',fontWeight:600,fontSize:'0.92rem',display:'flex',alignItems:'center',justifyContent:'center',gap:10,transition:'all .15s',marginBottom:12,opacity:loading?0.6:1}}>
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.0 24.0 0 0 0 0 21.56l7.98-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Continue with Google
        </button>

        <div className="auth-divider">or use email</div>

        <form onSubmit={handleSubmit}>
          {mode === 'signup' && (
            <input className="auth-input" type="text" placeholder="Your name" value={displayName} onChange={e=>setDisplayName(e.target.value)} autoComplete="name"/>
          )}
          <input className="auth-input" type="email" placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} required autoComplete="email"/>
          <input className="auth-input" type="password" placeholder="Password" value={password} onChange={e=>setPassword(e.target.value)} required minLength={6} autoComplete={mode==='login'?'current-password':'new-password'}/>

          <button className="auth-btn auth-btn-primary" type="submit" disabled={loading}>
            {loading ? 'Loading...' : (mode === 'login' ? 'Sign in' : 'Create account')}
          </button>
        </form>

        <button type="button" style={{width:'100%',background:'transparent',border:'none',color:'var(--text-dim)',cursor:'pointer',fontSize:'0.84rem',padding:'8px 0',marginTop:4}}
          onClick={()=>{setMode(mode==='login'?'signup':'login');setError(null);}}>
          {mode === 'login' ? "Don't have an account? Sign up" : 'Already have an account? Sign in'}
        </button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   BULK CONFIRMATION CARD
   ═══════════════════════════════════════════════ */
function BulkConfirmationCard({ actions, onConfirmSelected, onCancel }) {
  const [checked, setChecked] = useState(actions.map(() => true));
  const [selectAll, setSelectAll] = useState(true);

  useEffect(() => { setChecked(actions.map(() => true)); setSelectAll(true); }, [actions.length]);

  function toggleItem(idx) { setChecked(prev => { const n=[...prev]; n[idx]=!n[idx]; return n; }); }
  function toggleAll() { const v=!selectAll; setSelectAll(v); setChecked(actions.map(()=>v)); }

  function getActionLabel(a) {
    const labels = { add_task:'Task', add_event:'Event', add_block:'Block', delete_task:'Delete Task', delete_event:'Delete Event', update_event:'Update', break_task:'Split', delete_block:'Remove Block', add_recurring_event:'Recurring' };
    return (labels[a.type]||'Action')+': '+(a.title||a.activity||a.parent_title||'Untitled');
  }
  function getBadgeColor(a) {
    if (a.type?.startsWith('delete')) return 'var(--danger)';
    if (a.type==='add_event'||a.type==='add_recurring_event') return 'var(--teal)';
    if (a.type==='add_block') return 'var(--blue)';
    return 'var(--accent)';
  }

  const selectedCount = checked.filter(Boolean).length;

  return (
    <div className="confirm-card" style={{maxWidth:420,borderLeftColor:'var(--accent)'}}>
      <div className="confirm-card-hdr">
        <div className="confirm-card-hdr-left">
          <div className="confirm-card-hdr-icon" style={{background:'rgba(108,99,255,0.1)',borderColor:'rgba(108,99,255,0.2)',color:'var(--accent)'}}>{Icon.layers(16)}</div>
          <span className="confirm-card-hdr-title">Bulk Add</span>
        </div>
        <span className="confirm-card-hdr-badge" style={{background:'rgba(108,99,255,0.1)',color:'var(--accent)',border:'1px solid rgba(108,99,255,0.2)'}}>{actions.length} items</span>
      </div>
      <div className="confirm-card-body" style={{maxHeight:250,overflowY:'auto'}}>
        <label style={{display:'flex',alignItems:'center',gap:8,padding:'6px 0',cursor:'pointer',fontWeight:600,fontSize:'0.82rem',borderBottom:'1px solid rgba(255,255,255,0.05)'}}>
          <input type="checkbox" checked={selectAll} onChange={toggleAll}/> Select All ({actions.length})
        </label>
        {actions.map((pa,idx)=>(
          <label key={idx} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 0',cursor:'pointer',fontSize:'0.82rem',borderBottom:'1px solid rgba(255,255,255,0.03)'}}>
            <input type="checkbox" checked={checked[idx]} onChange={()=>toggleItem(idx)}/>
            <span style={{display:'inline-block',width:6,height:6,borderRadius:'50%',background:getBadgeColor(pa.action),flexShrink:0}}/>
            <span style={{flex:1}}>
              {getActionLabel(pa.action)}
              {pa.action.date&&<span style={{color:'var(--text-dim)',fontSize:'0.75rem',marginLeft:6}}>{fmt(pa.action.date)}</span>}
              {pa.action.due&&<span style={{color:'var(--text-dim)',fontSize:'0.75rem',marginLeft:6}}>due {fmt(pa.action.due)}</span>}
            </span>
          </label>
        ))}
      </div>
      <div className="confirm-card-actions">
        <button className="confirm-btn confirm-btn-yes" onClick={()=>onConfirmSelected(checked)} disabled={selectedCount===0}>
          {Icon.check(14)} Approve {selectedCount}
        </button>
        <button className="confirm-btn confirm-btn-cancel" onClick={onCancel}>{Icon.x(14)} Dismiss All</button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   RECURRING EVENT POPUP
   ═══════════════════════════════════════════════ */
function RecurringEventPopup({ action, onConfirm, onCancel }) {
  const [generatedEvents, setGeneratedEvents] = useState([]);
  const [selAll, setSelAll] = useState(true);

  useEffect(() => {
    const dayNameToIndex = { Sunday:0,Monday:1,Tuesday:2,Wednesday:3,Thursday:4,Friday:5,Saturday:6 };
    const dayIndices = (action.days||[]).map(d=>dayNameToIndex[d]).filter(d=>d!==undefined);
    const start = new Date(action.start_date || new Date().toISOString().slice(0,10));
    const endDefault = new Date(); endDefault.setMonth(endDefault.getMonth()+3);
    const end = new Date(action.end_date || endDefault.toISOString().slice(0,10));
    const generated = [];
    const cursor = new Date(start);
    while (cursor <= end && generated.length < 100) {
      if (dayIndices.includes(cursor.getDay())) {
        const ds = toDateStr(cursor);
        generated.push({ id:Math.random().toString(36).slice(2), title:action.title||'Event', date:ds, event_type:action.event_type||'event', subject:action.subject||'', checked:true });
      }
      cursor.setDate(cursor.getDate()+1);
    }
    setGeneratedEvents(generated);
  }, [action]);

  function toggleEv(idx) { setGeneratedEvents(prev=>prev.map((ev,i)=>i===idx?{...ev,checked:!ev.checked}:ev)); }
  function toggleAllEv() { const v=!selAll; setSelAll(v); setGeneratedEvents(prev=>prev.map(ev=>({...ev,checked:v}))); }
  const checkedCount = generatedEvents.filter(e=>e.checked).length;

  return (
    <div className="confirm-card" style={{maxWidth:420,borderLeftColor:'var(--teal)'}}>
      <div className="confirm-card-hdr">
        <div className="confirm-card-hdr-left">
          <div className="confirm-card-hdr-icon" style={{background:'rgba(43,203,186,0.1)',borderColor:'rgba(43,203,186,0.2)',color:'var(--teal)'}}>{Icon.calendar(16)}</div>
          <span className="confirm-card-hdr-title">Recurring: {action.title}</span>
        </div>
        <span className="confirm-card-hdr-badge" style={{background:'rgba(43,203,186,0.1)',color:'var(--teal)',border:'1px solid rgba(43,203,186,0.2)'}}>{checkedCount} events</span>
      </div>
      <div className="confirm-card-body" style={{maxHeight:200,overflowY:'auto'}}>
        <label style={{display:'flex',alignItems:'center',gap:8,padding:'4px 0',cursor:'pointer',fontWeight:600,fontSize:'0.82rem',borderBottom:'1px solid rgba(255,255,255,0.05)'}}>
          <input type="checkbox" checked={selAll} onChange={toggleAllEv}/> Select All ({generatedEvents.length})
        </label>
        {generatedEvents.map((ev,idx)=>(
          <label key={ev.id} style={{display:'flex',alignItems:'center',gap:8,padding:'4px 0',cursor:'pointer',fontSize:'0.82rem'}}>
            <input type="checkbox" checked={ev.checked} onChange={()=>toggleEv(idx)}/>
            <span>{ev.title} — {fmt(ev.date)} ({new Date(ev.date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short'})})</span>
          </label>
        ))}
      </div>
      <div className="confirm-card-actions">
        <button className="confirm-btn confirm-btn-yes" onClick={()=>onConfirm(generatedEvents.filter(e=>e.checked))} disabled={checkedCount===0}>
          {Icon.check(14)} Add {checkedCount} Events
        </button>
        <button className="confirm-btn confirm-btn-cancel" onClick={onCancel}>{Icon.x(14)} Cancel</button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   CONTENT DISPLAY COMPONENTS

function ContentCard({ icon, title, subject, onSave, onDismiss, children, accentColor }) {

          <div className="content-card-title">{title}</div>
