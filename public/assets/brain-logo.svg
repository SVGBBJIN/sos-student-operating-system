<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#0d0d1a"/>
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#22d3ee"/>
      <stop offset="50%"  stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#22d3ee" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
  </defs>

  <!-- Outer brain outline / top lobes -->
  <path d="M 72,48 C 58,38 36,42 30,60 C 24,76 32,90 44,96
           C 38,108 40,124 50,132 C 60,140 74,138 82,132
           C 86,146 96,154 108,152 C 120,150 126,138 124,126
           C 136,124 148,114 148,100 C 148,86 138,76 126,74
           C 128,60 120,46 106,44 C 94,42 82,50 78,60"
        fill="none" stroke="url(#g1)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Inner left lobe ribbon -->
  <path d="M 66,76 C 58,82 56,94 62,102 C 68,110 80,112 88,106"
        fill="none" stroke="url(#g1)" stroke-width="9" stroke-linecap="round"/>

  <!-- Inner right lobe ribbon -->
  <path d="M 116,70 C 128,74 134,86 130,98 C 126,108 116,114 106,112"
        fill="none" stroke="url(#g2)" stroke-width="9" stroke-linecap="round"/>

  <!-- Central sulcus ribbon -->
  <path d="M 88,58 C 86,72 88,90 92,106 C 94,116 96,126 96,138"
        fill="none" stroke="url(#g1)" stroke-width="8" stroke-linecap="round"/>

  <!-- Cross ribbon -->
  <path d="M 58,96 C 70,100 84,100 100,98 C 114,96 126,94 136,98"
        fill="none" stroke="url(#g2)" stroke-width="8" stroke-linecap="round"/>

  <!-- Lower ribbon / temporal lobe -->
  <path d="M 62,116 C 68,126 78,136 92,138 C 104,140 114,134 118,124"
        fill="none" stroke="url(#g1)" stroke-width="8" stroke-linecap="round"/>

  <!-- Brain stem -->
  <path d="M 96,150 C 96,158 97,164 98,170"
        fill="none" stroke="url(#g2)" stroke-width="8" stroke-linecap="round"/>

  <!-- Stem end dot -->
  <circle cx="98" cy="174" r="5" fill="#3730a3"/>
</svg>
