<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#100618"/>
  <defs>
    <linearGradient id="g" x1="5%" y1="5%" x2="95%" y2="95%">
      <stop offset="0%"   stop-color="#22d3ee"/>
      <stop offset="52%"  stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
  </defs>

  <!-- Brain silhouette — right lateral view, bumpy cortex top, temporal lobe, brainstem -->
  <path fill="url(#g)" d="
    M 16,28 L 15,27
    C 12,26 10,24  9,22
    C  7,20  5,18  4,15
    C  3,12  4, 9  6, 7
    C  7, 5  9, 4 11, 4
    C 11, 2 13, 2 14, 3
    C 15, 2 17, 2 18, 3
    C 19, 2 21, 2 22, 4
    C 24, 3 26, 5 27, 8
    C 28,11 27,14 26,16
    C 25,18 23,19 22,21
    C 24,23 22,27 20,28
    C 18,29 16,28 16,28
    Z
  "/>

  <!-- Brainstem nub -->
  <ellipse cx="16" cy="29.5" rx="1.8" ry="1.3" fill="url(#g)"/>

  <!-- Sulcus lines (suggest cortex folds at scale) -->
  <path fill="none" stroke="rgba(16,6,24,.4)" stroke-width="1.3" stroke-linecap="round"
        d="M 13,5 C 11,9 11,15 13,20"/>
  <path fill="none" stroke="rgba(16,6,24,.4)" stroke-width="1.3" stroke-linecap="round"
        d="M 19,4 C 19,8 18,14 17,19"/>
  <path fill="none" stroke="rgba(16,6,24,.25)" stroke-width="1" stroke-linecap="round"
        d="M 7,13 C 9,11 13,11 17,12"/>
</svg>
